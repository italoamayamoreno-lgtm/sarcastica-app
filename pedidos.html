<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pedidos · Sarcástica OS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f1e8df;--black:#000;--rosa:#e1c4c1;--borde:#cca99d;--gris:#50504f;--verde:#3B6D11;--azul:#185FA5;--naranja:#854F0B;--rojo:#A32D2D;}
body{font-family:'Poppins',sans-serif;background:var(--bg);min-height:100vh;color:var(--black);}
.page{max-width:1100px;margin:0 auto;padding:32px 24px;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.page-title{font-size:22px;font-weight:800;}
.btn-primary{background:var(--black);color:#fff;border:none;padding:10px 20px;border-radius:8px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s;}
.btn-primary:hover{opacity:.8;}

/* Filtros */
.filtros{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.filtro-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--borde);background:#fff;font-family:'Poppins',sans-serif;font-size:12px;font-weight:500;color:var(--gris);cursor:pointer;transition:all .15s;}
.filtro-btn.active,.filtro-btn:hover{background:var(--black);color:#fff;border-color:var(--black);}

/* Tabla */
.tabla-wrap{background:#fff;border:1.5px solid var(--borde);border-radius:12px;overflow:hidden;}
.tabla{width:100%;border-collapse:collapse;}
.tabla th{padding:12px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--gris);text-transform:uppercase;letter-spacing:.06em;background:#faf5f0;border-bottom:1px solid var(--borde);}
.tabla td{padding:14px 16px;font-size:13px;border-bottom:1px solid #f0e8e0;vertical-align:middle;}
.tabla tr:last-child td{border-bottom:none;}
.tabla tr:hover td{background:#fdf9f6;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-pendiente{background:#faeeda;color:var(--naranja);}
.badge-produccion{background:#e0eaf8;color:var(--azul);}
.badge-empaque{background:#f0e0f8;color:#6B21A8;}
.badge-ruta{background:#e8f5e0;color:var(--verde);}
.badge-entregado{background:#e0f0e0;color:var(--verde);}
.empty{text-align:center;padding:60px 0;color:var(--borde);}
.empty-icon{font-size:36px;margin-bottom:8px;}
.empty-text{font-size:13px;}
</style>
</head>
<body>

<div class="page">
  <div class="page-header">
    <div class="page-title">Pedidos</div>
    <button class="btn-primary" id="btnNuevo">+ Nuevo pedido</button>
  </div>

  <div class="filtros">
    <button class="filtro-btn active" data-estado="todos">Todos</button>
    <button class="filtro-btn" data-estado="pendiente_validacion">Por validar</button>
    <button class="filtro-btn" data-estado="en_produccion">En producción</button>
    <button class="filtro-btn" data-estado="en_empaque">Empaque</button>
    <button class="filtro-btn" data-estado="en_ruta">En ruta</button>
    <button class="filtro-btn" data-estado="entregado">Entregados</button>
  </div>

  <div class="tabla-wrap">
    <table class="tabla">
      <thead>
        <tr>
          <th>#</th>
          <th>Cliente</th>
          <th>Fecha entrega</th>
          <th>Items</th>
          <th>Estado</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody id="tablaPedidos">
        <tr><td colspan="6"><div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Cargando pedidos...</div></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<script type="module">
import { initPage, db } from './nav.js';
import { collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const EMPRESA = 'sarcastica';
const BADGE = {
  pendiente_validacion: ['badge-pendiente','Por validar'],
  en_produccion:        ['badge-produccion','En producción'],
  en_empaque:           ['badge-empaque','Empaque'],
  empaquetado:          ['badge-empaque','Empaquetado'],
  en_ruta:              ['badge-ruta','En ruta'],
  entregado:            ['badge-entregado','Entregado'],
};

const user = await initPage(['directora','operaciones','ventas']);

let estadoActual = 'todos';
let unsubscribe = null;

function cargarPedidos() {
  if (unsubscribe) unsubscribe();

  let q;
  if (estadoActual === 'todos') {
    q = query(collection(db, `empresas/${EMPRESA}/pedidos`), orderBy('creadoEn','desc'));
  } else {
    q = query(
      collection(db, `empresas/${EMPRESA}/pedidos`),
      where('estado','==', estadoActual),
      orderBy('creadoEn','desc')
    );
  }

  unsubscribe = onSnapshot(q, snap => {
    const tbody = document.getElementById('tablaPedidos');
    if (snap.empty) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty"><div class="empty-icon">📋</div><div class="empty-text">No hay pedidos en este estado</div></div></td></tr>`;
      return;
    }
    tbody.innerHTML = snap.docs.map(d => {
      const p = d.data();
      const [badgeClass, badgeLabel] = BADGE[p.estado] || ['','—'];
      return `
        <tr>
          <td style="font-weight:600;color:var(--gris);font-size:12px;">#${d.id.slice(-6).toUpperCase()}</td>
          <td style="font-weight:600;">${p.cliente_nombre || '—'}</td>
          <td>${p.fechaEntrega || '—'}</td>
          <td>${p.total_items || '—'} item(s)</td>
          <td><span class="badge ${badgeClass}">${badgeLabel}</span></td>
          <td><a href="pedido-detalle.html?id=${d.id}" style="color:var(--azul);font-size:12px;font-weight:500;text-decoration:none;">Ver →</a></td>
        </tr>
      `;
    }).join('');
  });
}

// Filtros
document.querySelectorAll('.filtro-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    estadoActual = btn.dataset.estado;
    cargarPedidos();
  });
});

// Nuevo pedido — Día 2
document.getElementById('btnNuevo').onclick = () => {
  alert('Módulo de nuevo pedido disponible en Día 2 del desarrollo.');
};

cargarPedidos();
</script>
</body>
</html>
