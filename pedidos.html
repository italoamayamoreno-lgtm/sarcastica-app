<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pedidos · Sarcástica OS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style id="nav-css">
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f1e8df;--black:#000;--rosa:#e1c4c1;--borde:#cca99d;--gris:#50504f;--verde:#3B6D11;--azul:#185FA5;--naranja:#854F0B;--rojo:#A32D2D;}
#app-nav{position:fixed;top:0;left:0;right:0;z-index:200;background:#000;display:flex;align-items:center;padding:0 20px;height:52px;gap:4px;border-bottom:2px solid #e1c4c1;font-family:"Poppins",sans-serif;}
#app-nav .nav-logo{display:flex;align-items:center;margin-right:20px;flex-shrink:0;text-decoration:none;}
#app-nav .nav-divider{width:1px;height:20px;background:#333;margin-right:8px;}
#app-nav .nav-items{display:flex;gap:2px;flex:1;overflow-x:auto;}
#app-nav .nav-items::-webkit-scrollbar{display:none;}
#app-nav a.nav-link{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;color:#888;text-decoration:none;white-space:nowrap;transition:background .15s,color .15s;}
#app-nav a.nav-link:hover{background:#111;color:#f1e8df;}
#app-nav a.nav-link.active{background:#e1c4c1;color:#000;font-weight:600;}
#app-nav .nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0;}
#app-nav .nav-powered{font-size:10px;color:#444;letter-spacing:.04em;}
#app-nav .nav-powered strong{color:#cca99d;}
#app-nav .nav-rol{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.06em;}
#app-nav .btn-salir{background:none;border:1px solid #333;color:#888;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:"Poppins",sans-serif;font-size:11px;transition:border-color .15s,color .15s;}
#app-nav .btn-salir:hover{border-color:#e1c4c1;color:#f1e8df;}
body{padding-top:52px!important;font-family:"Poppins",sans-serif;background:var(--bg);min-height:100vh;color:var(--black);}
</style>
<style>
.page{max-width:1100px;margin:0 auto;padding:28px 24px;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.page-title{font-size:20px;font-weight:800;}
.page-sub{font-size:12px;color:var(--gris);margin-top:2px;}
.btn-primary{background:var(--black);color:#fff;border:none;padding:10px 20px;border-radius:8px;font-family:"Poppins",sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.btn-primary:hover{opacity:.8;}
.filtros{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filtro-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--borde);background:#fff;font-family:"Poppins",sans-serif;font-size:12px;font-weight:500;color:var(--gris);cursor:pointer;transition:all .15s;}
.filtro-btn.active,.filtro-btn:hover{background:var(--black);color:#fff;border-color:var(--black);}
.tabla-wrap{background:#fff;border:1.5px solid var(--borde);border-radius:12px;overflow:hidden;}
.tabla-header{display:grid;grid-template-columns:70px 1fr 90px 90px 80px 140px 60px;padding:10px 16px;background:#eddbd0;gap:8px;}
.tabla-header span{font-size:11px;font-weight:600;color:var(--gris);text-transform:uppercase;letter-spacing:.06em;}
.tabla-row{display:grid;grid-template-columns:70px 1fr 90px 90px 80px 140px 60px;padding:13px 16px;border-top:1px solid #f0e8e0;align-items:center;gap:8px;transition:background .1s;}
.tabla-row:hover{background:#fdf9f6;}
.tabla-empty{text-align:center;padding:60px 0;color:var(--borde);font-size:13px;}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.badge-pend{background:#faeeda;color:var(--naranja);}
.badge-prod{background:#e0eaf8;color:var(--azul);}
.badge-emp{background:#f0e0f8;color:#6B21A8;}
.badge-ruta{background:#e8f5e0;color:var(--verde);}
.badge-ok{background:#e8f5e0;color:var(--verde);}
.badge-wa{background:#dcf8ec;color:#128C5E;}
.badge-ig{background:#FCE4EC;color:#880E4F;}
.badge-web{background:#e0eaf8;color:var(--azul);}
.cliente-nombre{font-size:13px;font-weight:600;}
.cliente-sub{font-size:11px;color:var(--gris);margin-top:1px;}
.ver-link{font-size:12px;color:var(--azul);font-weight:500;text-decoration:none;cursor:pointer;}
.pedido-num{font-size:12px;font-weight:600;color:var(--gris);}
.monto{font-size:13px;font-weight:600;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;overflow-y:auto;padding:20px 16px;}
.modal-overlay.open{display:flex;justify-content:center;align-items:flex-start;}
.modal{background:#fff;border-radius:16px;width:100%;max-width:660px;margin:auto;}
.modal-header{background:#000;border-radius:16px 16px 0 0;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
.modal-htitle{font-size:15px;font-weight:700;color:#fff;}
.modal-hsub{font-size:11px;color:#666;margin-top:2px;}
.modal-status{font-size:11px;font-weight:600;color:var(--naranja);}
.modal-close{background:none;border:none;color:#666;font-size:22px;cursor:pointer;line-height:1;padding:0;}
.modal-close:hover{color:#fff;}
.modal-body{padding:20px;}
.sec-label{font-size:9px;font-weight:600;color:var(--borde);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;}
.form-card{background:var(--bg);border:1px solid var(--borde);border-radius:10px;padding:14px;margin-bottom:12px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
.field{display:flex;flex-direction:column;gap:3px;}
.field label{font-size:10px;font-weight:600;color:var(--gris);text-transform:uppercase;letter-spacing:.04em;}
.field input,.field select{background:#fff;border:1px solid var(--borde);border-radius:6px;padding:7px 10px;font-family:"Poppins",sans-serif;font-size:12px;color:var(--black);outline:none;transition:border-color .15s;width:100%;}
.field input:focus,.field select:focus{border-color:var(--black);}
.cliente-alert{border-radius:6px;padding:8px 12px;font-size:11px;margin-top:8px;display:none;}
.alert-nuevo{background:#faeeda;color:var(--naranja);border:1px solid #e8c99a;display:block;}
.alert-encontrado{background:#e8f5e0;color:var(--verde);display:block;}
.item-box{background:#fff;border:1px solid var(--borde);border-radius:8px;padding:12px;margin-bottom:8px;}
.item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.item-num{font-size:10px;color:var(--borde);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.item-del{font-size:11px;color:var(--rojo);cursor:pointer;background:none;border:none;font-family:"Poppins",sans-serif;padding:0;}
.stock-msg{border-radius:5px;padding:5px 8px;font-size:10px;margin-top:6px;display:none;}
.stock-ok{background:#e8f5e0;color:var(--verde);}
.stock-low{background:#faeeda;color:var(--naranja);}
.stock-out{background:#fcebeb;color:var(--rojo);}
.btn-add-item{border:1.5px dashed var(--borde);border-radius:8px;padding:10px;text-align:center;font-size:12px;color:var(--borde);cursor:pointer;background:none;width:100%;font-family:"Poppins",sans-serif;margin-bottom:4px;}
.btn-add-item:hover{border-color:var(--black);color:var(--black);}
.voucher-box{background:#fff;border:1px solid var(--borde);border-radius:6px;padding:10px;text-align:center;font-size:11px;color:var(--gris);cursor:pointer;margin-top:4px;}
.voucher-box:hover{border-color:var(--black);}
.modal-footer{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-top:1px solid var(--borde);background:#faf5f0;border-radius:0 0 16px 16px;}
.total-label{font-size:15px;font-weight:700;}
.footer-btns{display:flex;gap:8px;}
.btn-sec{background:#fff;border:1.5px solid var(--borde);color:var(--gris);padding:9px 16px;border-radius:8px;font-family:"Poppins",sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.btn-sec:hover{border-color:var(--black);color:var(--black);}
.btn-reg{background:var(--black);color:#fff;border:none;padding:9px 18px;border-radius:8px;font-family:"Poppins",sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.btn-reg:hover{opacity:.85;}
.btn-reg:disabled{opacity:.4;cursor:not-allowed;}
</style>
</head>
<body>

<nav id="app-nav">
  <a href="dashboard.html" class="nav-logo">
    <svg viewBox="0 0 200 36" xmlns="http://www.w3.org/2000/svg" height="20"><text x="0" y="29" font-family="Georgia,serif" font-size="29" font-weight="400" fill="#ffffff" letter-spacing="-0.5">sarcástica.</text></svg>
  </a>
  <div class="nav-divider"></div>
  <div class="nav-items">
    <a href="dashboard.html"  class="nav-link" data-page="dashboard">Dashboard</a>
    <a href="pedidos.html"    class="nav-link" data-page="pedidos">Pedidos</a>
    <a href="inventario.html" class="nav-link" data-page="inventario">Inventario</a>
    <a href="produccion.html" class="nav-link" data-page="produccion">Producción</a>
    <a href="empaque.html"    class="nav-link" data-page="empaque">Empaque</a>

  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Pedidos</div>
      <div class="page-sub" id="fechaHoy"></div>
    </div>
    <button class="btn-primary" id="btnNuevo">+ Nuevo pedido</button>
  </div>

  <div class="filtros">
    <button class="filtro-btn active" data-estado="todos">Todos <span id="cnt-todos"></span></button>
    <button class="filtro-btn" data-estado="pendiente_validacion">Por validar <span id="cnt-pv"></span></button>
    <button class="filtro-btn" data-estado="en_produccion">En producción <span id="cnt-ep"></span></button>
    <button class="filtro-btn" data-estado="en_empaque">Empaque <span id="cnt-ee"></span></button>
    <button class="filtro-btn" data-estado="en_ruta">En ruta <span id="cnt-er"></span></button>
    <button class="filtro-btn" data-estado="entregado">Entregados <span id="cnt-en"></span></button>
  </div>

  <div class="tabla-wrap">
    <div class="tabla-header">
      <span>#</span><span>Cliente</span><span>Canal</span><span>Entrega</span><span>Monto</span><span>Estado</span><span></span>
    </div>
    <div id="listaPedidos"><div class="tabla-empty">Cargando pedidos...</div></div>
  </div>
</div>

<!-- MODAL NUEVO PEDIDO -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-htitle">Nuevo pedido</div>
        <div class="modal-hsub" id="modalSub"></div>
      </div>
      <div style="display:flex;align-items:center;gap:14px;">
        <span class="modal-status">● Pendiente validación</span>
        <button class="modal-close" id="btnCerrar">×</button>
      </div>
    </div>

    <div class="modal-body">
      <!-- CLIENTA -->
      <div class="form-card">
        <div class="sec-label">Datos de la clienta</div>
        <div class="g3">
          <div class="field"><label>DNI *</label><input type="text" id="dni" maxlength="8" placeholder="12345678"/></div>
          <div class="field"><label>Teléfono</label><input type="text" id="telefono" placeholder="+51 9xx xxx xxx"/></div>
          <div class="field"><label>Canal *</label>
            <select id="canal"><option value="">Seleccionar</option><option>WhatsApp</option><option>Instagram</option><option>Web</option></select>
          </div>
        </div>
        <div class="cliente-alert" id="clienteAlert"></div>
        <div id="clienteFields" style="display:none;margin-top:10px;">
          <div class="g2">
            <div class="field"><label>Nombre completo *</label><input type="text" id="nombre" placeholder="Nombre y apellidos"/></div>
            <div class="field"><label>Correo</label><input type="email" id="correo" placeholder="correo@gmail.com"/></div>
          </div>
          <div class="g3">
            <div class="field"><label>Distrito</label><input type="text" id="distrito" placeholder="Ej: La Molina"/></div>
            <div class="field"><label>Provincia</label><input type="text" id="provincia" placeholder="Ej: Lima"/></div>
            <div class="field"><label>Dirección</label><input type="text" id="direccion" placeholder="Dirección completa"/></div>
          </div>
        </div>
      </div>

      <!-- ITEMS -->
      <div class="form-card">
        <div class="sec-label">Ítems del pedido</div>
        <div id="itemsContainer"></div>
        <button class="btn-add-item" id="btnAddItem">+ Agregar otro ítem</button>
      </div>

      <!-- PAGO Y ENTREGA -->
      <div class="form-card">
        <div class="sec-label">Pago y entrega</div>
        <div class="g2">
          <div class="field"><label>Medio de pago *</label>
            <select id="medioPago"><option value="">Seleccionar</option><option>Yape</option><option>Plin</option><option>Transferencia</option><option>MercadoPago</option></select>
          </div>
          <div class="field"><label>Fecha de entrega *</label><input type="date" id="fechaEntrega"/></div>
        </div>
        <div class="field" style="margin-top:8px;">
          <label>Voucher de pago (pantallazo)</label>
          <div class="voucher-box" id="voucherBox" onclick="document.getElementById('voucherInput').click()">
            📎 Toca para adjuntar pantallazo del pago
          </div>
          <input type="file" id="voucherInput" accept="image/*" style="display:none"/>
        </div>
        <div class="field" style="margin-top:8px;">
          <label>Observación</label>
          <input type="text" id="observacion" placeholder="Ej: envolver para regalo"/>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <div class="total-label" id="totalLabel">Total: S/ 0.00</div>
      <div class="footer-btns">
        <button class="btn-sec" id="btnBorrador">Guardar borrador</button>
        <button class="btn-reg" id="btnRegistrar">Registrar y enviar a validación →</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initPage, db, auth } from './nav.js';
import {
  collection, query, orderBy, where, onSnapshot,
  doc, getDoc, setDoc, addDoc, serverTimestamp, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const EMPRESA = 'sarcastica';
const user = await initPage(['directora','operaciones','ventas']);

const hoy = new Date();
const hoyStr = hoy.toISOString().split('T')[0];
document.getElementById('fechaHoy').textContent =
  hoy.toLocaleDateString('es-PE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
document.getElementById('modalSub').textContent =
  (user.nombre || user.email) + ' · ' + hoy.toLocaleDateString('es-PE',{day:'numeric',month:'short',year:'numeric'});
document.getElementById('fechaEntrega').min = hoyStr;
document.getElementById('fechaEntrega').value = hoyStr;

const BADGE = {
  pendiente_validacion:['badge-pend','Por validar'],
  en_produccion:['badge-prod','En producción'],
  en_empaque:['badge-emp','Empaque'],
  empaquetado:['badge-emp','Empaquetado'],
  en_ruta:['badge-ruta','En ruta'],
  entregado:['badge-ok','Entregado'],
};
const CANAL_B = { WhatsApp:['badge-wa','WA'], Instagram:['badge-ig','IG'], Web:['badge-web','Web'] };

// ---- LISTA ----
let estadoActual = 'todos', unsub = null;
function cargarPedidos() {
  if (unsub) unsub();
  const col = collection(db, `empresas/${EMPRESA}/pedidos`);
  const q = estadoActual === 'todos'
    ? query(col, orderBy('creadoEn','desc'))
    : query(col, where('estado','==',estadoActual), orderBy('creadoEn','desc'));
  unsub = onSnapshot(q, snap => {
    const lista = document.getElementById('listaPedidos');
    if (snap.empty) { lista.innerHTML = '<div class="tabla-empty">No hay pedidos en este estado</div>'; return; }
    lista.innerHTML = snap.docs.map(d => {
      const p = d.data();
      const [bc,bl] = BADGE[p.estado] || ['','--'];
      const [cc,cl] = CANAL_B[p.canal] || ['badge-web', p.canal||'--'];
      const fecha = p.fechaEntrega || '--';
      const urgente = fecha === hoyStr ? ' <span style="color:var(--rojo);font-size:10px;font-weight:600;">HOY</span>' : '';
      return `<div class="tabla-row">
        <span class="pedido-num">#${d.id.slice(-5).toUpperCase()}</span>
        <div>
          <div class="cliente-nombre">${p.cliente_nombre||'--'}</div>
          <div class="cliente-sub">${[p.distrito,p.provincia,p.cliente_dni].filter(Boolean).join(' · ')}</div>
        </div>
        <span class="badge ${cc}">${cl}</span>
        <span style="font-size:12px;color:var(--gris);">${fecha}${urgente}</span>
        <span class="monto">S/ ${(p.total||0).toFixed(2)}</span>
        <span class="badge ${bc}">${bl}</span>
        <a class="ver-link" href="pedido-detalle.html?id=${d.id}">Ver →</a>
      </div>`;
    }).join('');
  });
}

// Contadores
[['todos','cnt-todos'],['pendiente_validacion','cnt-pv'],['en_produccion','cnt-ep'],
 ['en_empaque','cnt-ee'],['en_ruta','cnt-er'],['entregado','cnt-en']].forEach(([estado,elId]) => {
  const q2 = estado === 'todos'
    ? query(collection(db,`empresas/${EMPRESA}/pedidos`))
    : query(collection(db,`empresas/${EMPRESA}/pedidos`),where('estado','==',estado));
  onSnapshot(q2, snap => {
    const el = document.getElementById(elId);
    if (el) el.textContent = snap.size ? `(${snap.size})` : '';
  });
});

document.querySelectorAll('.filtro-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    estadoActual = btn.dataset.estado;
    cargarPedidos();
  });
});
cargarPedidos();

// ---- MODAL ----
let productos = [];
let itemCount = 0;

async function cargarProductos() {
  const snap = await getDocs(collection(db,`empresas/${EMPRESA}/inventario_crudos`));
  productos = [];
  snap.forEach(d => productos.push({id:d.id,...d.data()}));
}

function calcTotal() {
  let t = 0;
  document.querySelectorAll('.item-precio').forEach(inp => { const v=parseFloat(inp.value); if(!isNaN(v)) t+=v; });
  document.getElementById('totalLabel').textContent = `Total: S/ ${t.toFixed(2)}`;
}

function getCategorias() {
  const cats = [...new Set(productos.map(p=>p.categoria).filter(Boolean))];
  return cats.length ? cats : ['Para beber','Librería','Prendas','Bebés'];
}

function addItem() {
  itemCount++;
  const idx = itemCount;
  const cats = getCategorias();
  const div = document.createElement('div');
  div.className = 'item-box'; div.id = `item-${idx}`;
  div.innerHTML = `
    <div class="item-header">
      <span class="item-num">Ítem ${idx}</span>
      <button class="item-del" onclick="removeItem(${idx})">✕ eliminar</button>
    </div>
    <div class="g3">
      <div class="field"><label>Categoría</label>
        <select class="item-cat" data-idx="${idx}" onchange="onCatChange(${idx})">
          <option value="">Seleccionar</option>${cats.map(c=>`<option>${c}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Producto</label>
        <select class="item-prod" data-idx="${idx}" onchange="onProdChange(${idx})">
          <option value="">-- elige categoría --</option>
        </select>
      </div>
      <div class="field"><label>Variante</label>
        <input type="text" class="item-variante" data-idx="${idx}" placeholder="Ej: Blanco 350ml"/>
      </div>
    </div>
    <div class="g2" style="margin-top:6px;">
      <div class="field"><label>Diseño / detalle</label>
        <input type="text" class="item-diseno" data-idx="${idx}" placeholder="Lo que pide la clienta"/>
      </div>
      <div class="field"><label>Precio unitario (S/)</label>
        <input type="number" class="item-precio" data-idx="${idx}" placeholder="0.00" step="0.01" min="0" oninput="calcTotal()"/>
      </div>
    </div>
    <div class="stock-msg stock-ok" id="sok-${idx}"></div>
    <div class="stock-msg stock-low" id="slow-${idx}"></div>
    <div class="stock-msg stock-out" id="sout-${idx}"></div>`;
  document.getElementById('itemsContainer').appendChild(div);
}

window.removeItem = idx => { const el=document.getElementById(`item-${idx}`); if(el)el.remove(); calcTotal(); };

window.onCatChange = idx => {
  const cat = document.querySelector(`.item-cat[data-idx="${idx}"]`).value;
  const sel = document.querySelector(`.item-prod[data-idx="${idx}"]`);
  const filtrados = productos.filter(p=>p.categoria===cat);
  sel.innerHTML = filtrados.length
    ? `<option value="">Seleccionar</option>${filtrados.map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('')}`
    : `<option value="">Sin productos</option>`;
  [`sok-${idx}`,`slow-${idx}`,`sout-${idx}`].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});
};

window.onProdChange = idx => {
  const prodId = document.querySelector(`.item-prod[data-idx="${idx}"]`).value;
  const prod = productos.find(p=>p.id===prodId);
  [`sok-${idx}`,`slow-${idx}`,`sout-${idx}`].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});
  if (!prod) return;
  const disp = prod.disponible||0, seg = prod.stock_seguridad||0;
  if (disp===0) {
    const e=document.getElementById(`sout-${idx}`); e.textContent='✕ Sin stock disponible — no se puede registrar'; e.style.display='block';
  } else if (disp<=seg) {
    const e=document.getElementById(`slow-${idx}`); e.textContent=`⚠ Solo ${disp} disponibles (bajo mínimo) · Se reservará al registrar`; e.style.display='block';
  } else {
    const e=document.getElementById(`sok-${idx}`); e.textContent=`✓ ${disp} unidades disponibles · Se reservará al registrar`; e.style.display='block';
  }
};

// DNI lookup
let dniTimer = null;
document.getElementById('dni').addEventListener('input', function() {
  clearTimeout(dniTimer);
  const dni = this.value.trim();
  const alertEl = document.getElementById('clienteAlert');
  const fieldsEl = document.getElementById('clienteFields');
  alertEl.className = 'cliente-alert'; alertEl.textContent = '';
  if (dni.length < 8) { fieldsEl.style.display='none'; return; }
  dniTimer = setTimeout(async () => {
    const snap = await getDocs(query(collection(db,`empresas/${EMPRESA}/clientes`),where('dni','==',dni)));
    fieldsEl.style.display = 'block';
    if (!snap.empty) {
      const c = snap.docs[0].data();
      ['nombre','correo','distrito','provincia','direccion'].forEach(id=>{
        const el=document.getElementById(id); if(el) el.value=c[id]||'';
      });
      alertEl.className='cliente-alert alert-encontrado';
      alertEl.textContent='✓ Cliente encontrada en CRM — datos cargados automáticamente';
    } else {
      ['nombre','correo','distrito','provincia','direccion'].forEach(id=>{
        const el=document.getElementById(id); if(el) el.value='';
      });
      alertEl.className='cliente-alert alert-nuevo';
      alertEl.textContent='Cliente nueva — por favor completa los datos';
    }
  }, 600);
});

// Voucher
document.getElementById('voucherInput').addEventListener('change', function() {
  const f=this.files[0];
  if(f) document.getElementById('voucherBox').innerHTML=`📎 ${f.name} · adjuntado · <span style="color:var(--azul)">ver imagen</span>`;
});

// Abrir modal
document.getElementById('btnNuevo').onclick = async () => {
  await cargarProductos();
  itemCount=0;
  document.getElementById('itemsContainer').innerHTML='';
  ['dni','telefono','nombre','correo','distrito','provincia','direccion','observacion'].forEach(id=>{
    const el=document.getElementById(id); if(el)el.value='';
  });
  document.getElementById('canal').value='';
  document.getElementById('medioPago').value='';

  document.getElementById('voucherBox').innerHTML='📎 Toca para adjuntar pantallazo del pago';

document.getElementById('btnCerrar').onclick = () => document.getElementById('modalOverlay').classList.remove('open');
document.getElementById('modalOverlay').onclick = e => { if(e.target===document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('open'); };
document.getElementById('btnAddItem').onclick = addItem;

// REGISTRAR
document.getElementById('btnRegistrar').onclick = async () => {
  const dni=document.getElementById('dni').value.trim();
  const nombre=document.getElementById('nombre').value.trim();
  const canal=document.getElementById('canal').value;
  const fechaEntrega=document.getElementById('fechaEntrega').value;
  const medioPago=document.getElementById('medioPago').value;
  if(!dni||!nombre||!canal||!fechaEntrega||!medioPago){alert('Completa todos los campos obligatorios (*).');return;}

  const items=[]; let total=0; let valido=true;
  document.querySelectorAll('.item-box').forEach(box=>{
    const idx=box.id.replace('item-','');
    const cat=box.querySelector('.item-cat').value;
    const prodId=box.querySelector('.item-prod').value;
    const variante=box.querySelector('.item-variante').value.trim();
    const diseno=box.querySelector('.item-diseno').value.trim();
    const precio=parseFloat(box.querySelector('.item-precio').value);
    if(!cat||!prodId||isNaN(precio)||precio<=0){valido=false;return;}
    const prod=productos.find(p=>p.id===prodId);
    if(!prod||(prod.disponible||0)<=0){valido=false;return;}
    total+=precio;
    items.push({categoria:cat,productoId:prodId,productoNombre:prod.nombre,variante,diseno,precio,estado:'pendiente'});
  });

  if(!valido||items.length===0){alert('Revisa los ítems: categoría, producto y precio son obligatorios, y debe haber stock.');return;}

  const btn=document.getElementById('btnRegistrar');
  btn.disabled=true; btn.textContent='Registrando...';
  try {
    const pedidoRef=await addDoc(collection(db,`empresas/${EMPRESA}/pedidos`),{
      cliente_dni:dni, cliente_nombre:nombre,
      correo:document.getElementById('correo').value.trim(),
      telefono:document.getElementById('telefono').value.trim(),
      canal, distrito:document.getElementById('distrito').value.trim(),
      provincia:document.getElementById('provincia').value.trim(),
      direccion:document.getElementById('direccion').value.trim(),
      medioPago, fechaEntrega,
      observacion:document.getElementById('observacion').value.trim(),
      estado:'pendiente_validacion', total, total_items:items.length,
      vendedor:user.nombre||user.email, creadoEn:serverTimestamp(),
    });
    for(const item of items){
      await addDoc(collection(db,`empresas/${EMPRESA}/pedidos/${pedidoRef.id}/items`),item);
      const invRef=doc(db,`empresas/${EMPRESA}/inventario_crudos`,item.productoId);
      const invSnap=await getDoc(invRef);
      if(invSnap.exists()){
        const d=invSnap.data();
        await setDoc(invRef,{...d,disponible:Math.max(0,(d.disponible||0)-1),reservado:(d.reservado||0)+1});
      }
    }
    await setDoc(doc(db,`empresas/${EMPRESA}/clientes`,dni),{
      dni,nombre,correo:document.getElementById('correo').value.trim(),
      telefono:document.getElementById('telefono').value.trim(),
      distrito:document.getElementById('distrito').value.trim(),
      provincia:document.getElementById('provincia').value.trim(),
      direccion:document.getElementById('direccion').value.trim(),
      ultimoPedido:serverTimestamp(),
    },{merge:true});
    document.getElementById('modalOverlay').classList.remove('open');
    alert('✓ Pedido registrado y enviado a validación');
  } catch(e){
    console.error(e); alert('Error al registrar. Intenta de nuevo.');
  } finally {
    btn.disabled=false; btn.textContent='Registrar y enviar a validación →';
  }
};

document.getElementById('btnBorrador').onclick = () => alert('Función de borrador disponible próximamente.');
</script>
