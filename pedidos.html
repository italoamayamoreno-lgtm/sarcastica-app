<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pedidos · Sarcástica OS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style id="nav-css">
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f1e8df;--black:#000;--rosa:#e1c4c1;--borde:#cca99d;--gris:#50504f;--verde:#3B6D11;--azul:#185FA5;--naranja:#854F0B;--rojo:#A32D2D;}
#app-nav{position:fixed;top:0;left:0;right:0;z-index:200;background:#000;display:flex;align-items:center;padding:0 20px;height:52px;gap:4px;border-bottom:2px solid #e1c4c1;font-family:"Poppins",sans-serif;}
#app-nav .nav-logo{display:flex;align-items:center;margin-right:20px;flex-shrink:0;text-decoration:none;}
#app-nav .nav-divider{width:1px;height:20px;background:#333;margin-right:8px;}
#app-nav .nav-items{display:flex;gap:2px;flex:1;overflow-x:auto;}
#app-nav .nav-items::-webkit-scrollbar{display:none;}
#app-nav a.nav-link{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;color:#888;text-decoration:none;white-space:nowrap;transition:background .15s,color .15s;}
#app-nav a.nav-link:hover{background:#111;color:#f1e8df;}
#app-nav a.nav-link.active{background:#e1c4c1;color:#000;font-weight:600;}
#app-nav .nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0;}
#app-nav .nav-powered{font-size:10px;color:#444;letter-spacing:.04em;}
#app-nav .nav-powered strong{color:#cca99d;}
#app-nav .nav-rol{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.06em;}
#app-nav .btn-salir{background:none;border:1px solid #333;color:#888;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:"Poppins",sans-serif;font-size:11px;transition:border-color .15s,color .15s;}
#app-nav .btn-salir:hover{border-color:#e1c4c1;color:#f1e8df;}
body{padding-top:52px!important;font-family:"Poppins",sans-serif;background:var(--bg);min-height:100vh;color:var(--black);}
</style>
<style>
.page{max-width:1100px;margin:0 auto;padding:32px 24px;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.page-title{font-size:22px;font-weight:800;}
.btn-primary{background:var(--black);color:#fff;border:none;padding:10px 20px;border-radius:8px;font-family:"Poppins",sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.btn-primary:hover{opacity:.8;}
.filtros{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.filtro-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--borde);background:#fff;font-family:"Poppins",sans-serif;font-size:12px;font-weight:500;color:var(--gris);cursor:pointer;transition:all .15s;}
.filtro-btn.active,.filtro-btn:hover{background:var(--black);color:#fff;border-color:var(--black);}
.tabla-wrap{background:#fff;border:1.5px solid var(--borde);border-radius:12px;overflow:hidden;}
.tabla{width:100%;border-collapse:collapse;}
.tabla th{padding:12px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--gris);text-transform:uppercase;letter-spacing:.06em;background:#faf5f0;border-bottom:1px solid var(--borde);}
.tabla td{padding:14px 16px;font-size:13px;border-bottom:1px solid #f0e8e0;vertical-align:middle;}
.tabla tr:last-child td{border-bottom:none;}
.tabla tr:hover td{background:#fdf9f6;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-pendiente{background:#faeeda;color:var(--naranja);}
.badge-produccion{background:#e0eaf8;color:var(--azul);}
.badge-empaque{background:#f0e0f8;color:#6B21A8;}
.badge-ruta{background:#e8f5e0;color:var(--verde);}
.badge-entregado{background:#e0f0e0;color:var(--verde);}
.empty{text-align:center;padding:60px 0;color:var(--borde);font-size:13px;}
</style>
</head>
<body>
<nav id="app-nav">
  <a href="dashboard.html" class="nav-logo">
    <svg viewBox="0 0 200 36" xmlns="http://www.w3.org/2000/svg" height="20"><text x="0" y="29" font-family="Georgia,serif" font-size="29" font-weight="400" fill="#ffffff" letter-spacing="-0.5">sarcástica.</text></svg>
  </a>
  <div class="nav-divider"></div>
  <div class="nav-items">
    <a href="dashboard.html"  class="nav-link" data-page="dashboard">Dashboard</a>
    <a href="pedidos.html"    class="nav-link" data-page="pedidos">Pedidos</a>
    <a href="inventario.html" class="nav-link" data-page="inventario">Inventario</a>
    <a href="produccion.html" class="nav-link" data-page="produccion">Producción</a>
    <a href="empaque.html"    class="nav-link" data-page="empaque">Empaque</a>
    <a href="ruta.html"       class="nav-link" data-page="ruta">Ruta</a>
    <a href="clientes.html"   class="nav-link" data-page="clientes">Clientes</a>
    <a href="mermas.html"     class="nav-link" data-page="mermas">Mermas</a>
  </div>
  <div class="nav-right">
    <span class="nav-powered">powered by <strong>Etrazia</strong></span>
    <span class="nav-rol" id="nav-rol"></span>
    <button class="btn-salir" id="btn-salir">Salir</button>
  </div>
</nav>
<div class="page">
  <div class="page-header">
    <div class="page-title">Pedidos</div>
    <button class="btn-primary" id="btnNuevo">+ Nuevo pedido</button>
  </div>
  <div class="filtros">
    <button class="filtro-btn active" data-estado="todos">Todos</button>
    <button class="filtro-btn" data-estado="pendiente_validacion">Por validar</button>
    <button class="filtro-btn" data-estado="en_produccion">En producción</button>
    <button class="filtro-btn" data-estado="en_empaque">Empaque</button>
    <button class="filtro-btn" data-estado="en_ruta">En ruta</button>
    <button class="filtro-btn" data-estado="entregado">Entregados</button>
  </div>
  <div class="tabla-wrap">
    <table class="tabla">
      <thead><tr><th>#</th><th>Cliente</th><th>Fecha entrega</th><th>Items</th><th>Estado</th><th>Acción</th></tr></thead>
      <tbody id="tablaPedidos"><tr><td colspan="6"><div class="empty">Cargando pedidos...</div></td></tr></tbody>
    </table>
  </div>
</div>
<script type="module">
import { db } from "./nav.js";
import { collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const E="sarcastica";
const BADGE={pendiente_validacion:["badge-pendiente","Por validar"],en_produccion:["badge-produccion","En producción"],en_empaque:["badge-empaque","Empaque"],empaquetado:["badge-empaque","Empaquetado"],en_ruta:["badge-ruta","En ruta"],entregado:["badge-entregado","Entregado"]};
let estadoActual="todos",unsub=null;
function cargar(){
  if(unsub)unsub();
  const q=estadoActual==="todos"
    ?query(collection(db,\`empresas/\${E}/pedidos\`),orderBy("creadoEn","desc"))
    :query(collection(db,\`empresas/\${E}/pedidos\`),where("estado","==",estadoActual),orderBy("creadoEn","desc"));
  unsub=onSnapshot(q,snap=>{
    const tbody=document.getElementById("tablaPedidos");
    if(snap.empty){tbody.innerHTML='<tr><td colspan="6"><div class="empty">No hay pedidos en este estado</div></td></tr>';return;}
    tbody.innerHTML=snap.docs.map(d=>{
      const p=d.data();
      const[bc,bl]=BADGE[p.estado]||["","—"];
      return \`<tr><td style="font-weight:600;color:var(--gris);font-size:12px;">#\${d.id.slice(-6).toUpperCase()}</td><td style="font-weight:600;">\${p.cliente_nombre||"—"}</td><td>\${p.fechaEntrega||"—"}</td><td>\${p.total_items||"—"}</td><td><span class="badge \${bc}">\${bl}</span></td><td><a href="pedido-detalle.html?id=\${d.id}" style="color:var(--azul);font-size:12px;font-weight:500;text-decoration:none;">Ver →</a></td></tr>\`;
    }).join("");
  });
}
document.querySelectorAll(".filtro-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".filtro-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");estadoActual=btn.dataset.estado;cargar();
  });
});
document.getElementById("btnNuevo").onclick=()=>alert("Módulo de nuevo pedido disponible en Día 2.");
cargar();
</script>
<script type="module">
import { initPage } from './nav.js';
await initPage(['directora','operaciones','ventas']);
</script>
</body>
</html>
