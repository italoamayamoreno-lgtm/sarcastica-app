<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f1e8df;--black:#000;--rosa:#e1c4c1;--borde:#cca99d;--gris:#50504f;--verde:#3B6D11;--azul:#185FA5;--naranja:#854F0B;--rojo:#A32D2D;}
#app-nav{position:fixed;top:0;left:0;right:0;z-index:200;background:#000;display:flex;align-items:center;padding:0 20px;height:52px;border-bottom:2px solid #e1c4c1;font-family:"Poppins",sans-serif;}
#app-nav .nav-logo{display:flex;align-items:center;margin-right:16px;flex-shrink:0;text-decoration:none;}
#app-nav .nav-divider{width:1px;height:20px;background:#333;margin-right:8px;flex-shrink:0;}
#app-nav .nav-items{display:flex;gap:2px;flex:1;overflow-x:auto;}
#app-nav .nav-items::-webkit-scrollbar{display:none;}
#app-nav a.nav-link{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;color:#888;text-decoration:none;white-space:nowrap;}
#app-nav a.nav-link:hover{background:#111;color:#f1e8df;}
#app-nav a.nav-link.active{background:#e1c4c1;color:#000;font-weight:600;}
#app-nav .nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0;}
#app-nav .nav-powered{font-size:10px;color:#444;letter-spacing:.04em;white-space:nowrap;}
#app-nav .nav-powered strong{color:#cca99d;}
#app-nav .nav-username{font-size:11px;color:#888;white-space:nowrap;}
#app-nav .btn-salir{background:none;border:1px solid #333;color:#888;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:"Poppins",sans-serif;font-size:11px;}
#app-nav .btn-salir:hover{border-color:#e1c4c1;color:#f1e8df;}
.nav-user-wrap{position:relative;}
#nav-menu-btn{display:flex;width:28px;height:28px;border-radius:50%;background:#e1c4c1;border:none;cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0;flex-shrink:0;}
#nav-menu-btn span{display:block;width:12px;height:1.5px;background:#000;border-radius:2px;}
#nav-menu-dropdown{display:none;position:absolute;top:38px;right:0;background:#fff;border:1.5px solid var(--borde);border-radius:10px;min-width:180px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:500;}
#nav-menu-dropdown.open{display:block;}
#nav-menu-dropdown a{display:block;padding:11px 16px;font-size:13px;color:var(--black);text-decoration:none;font-family:"Poppins",sans-serif;white-space:nowrap;}
#nav-menu-dropdown a:hover{background:var(--bg);}
#nav-menu-dropdown .menu-sep{height:1px;background:var(--borde);margin:4px 0;}
body{padding-top:52px;font-family:"Poppins",sans-serif;background:var(--bg);min-height:100vh;color:var(--black);}

.page{max-width:1100px;margin:0 auto;padding:28px 24px;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.page-title{font-size:20px;font-weight:800;}
.page-sub{font-size:12px;color:var(--gris);margin-top:3px;}

.filtros-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filtro-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--borde);background:#fff;font-family:"Poppins",sans-serif;font-size:12px;font-weight:500;color:var(--gris);cursor:pointer;}
.filtro-btn.active,.filtro-btn:hover{background:var(--black);color:#fff;border-color:var(--black);}
.search-input{margin-left:auto;border:1.5px solid var(--borde);border-radius:8px;padding:7px 14px;font-family:"Poppins",sans-serif;font-size:12px;color:var(--black);outline:none;width:220px;background:#fff;}
.search-input:focus{border-color:var(--black);}

.layout{display:grid;grid-template-columns:1fr 380px;gap:16px;align-items:start;}

.tabla-wrap{background:#fff;border:1.5px solid var(--borde);border-radius:12px;overflow:hidden;}
.tabla-header{display:grid;grid-template-columns:2fr 80px 60px 80px 90px;padding:10px 16px;background:#eddbd0;gap:8px;}
.tabla-header span{font-size:11px;font-weight:600;color:var(--gris);text-transform:uppercase;letter-spacing:.06em;}
.tabla-row{display:grid;grid-template-columns:2fr 80px 60px 80px 90px;padding:12px 16px;border-top:1px solid #f0e8e0;align-items:center;gap:8px;cursor:pointer;transition:background .1s;}
.tabla-row:hover{background:#fdf9f6;}
.tabla-row.selected{background:#fdf0ea;border-left:3px solid var(--borde);}
.cl-nombre{font-size:13px;font-weight:600;}
.cl-sub{font-size:11px;color:var(--gris);margin-top:1px;}
.badge{display:inline-flex;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap;}
.badge-wa{background:#dcf8ec;color:#128C5E;}
.badge-ig{background:#FCE4EC;color:#880E4F;}
.badge-web{background:#e0eaf8;color:var(--azul);}
.badge-nd{background:#f0e8e0;color:var(--gris);}
.num-center{text-align:center;font-size:13px;font-weight:500;}
.monto-center{text-align:center;font-size:13px;font-weight:600;color:var(--verde);}
.fecha-center{text-align:center;font-size:11px;color:var(--gris);}
.tabla-empty{text-align:center;padding:60px 0;color:var(--borde);font-size:13px;}

/* FICHA */
.ficha{background:#fff;border:1.5px solid var(--borde);border-radius:12px;overflow:hidden;position:sticky;top:70px;}
.ficha-header{background:#000;padding:16px 18px;}
.ficha-nombre{font-size:15px;font-weight:700;color:#fff;}
.ficha-sub{font-size:11px;color:#888;margin-top:3px;}
.ficha-body{padding:16px 18px;}
.ficha-sec{font-size:9px;font-weight:600;color:var(--borde);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;margin-top:14px;}
.ficha-sec:first-child{margin-top:0;}
.ficha-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
.ficha-field .label{font-size:10px;color:var(--gris);margin-bottom:2px;}
.ficha-field .value{font-size:12px;font-weight:500;}
.pedido-hist{background:var(--bg);border-radius:6px;padding:8px 10px;margin-bottom:6px;}
.ph-top{display:flex;justify-content:space-between;align-items:center;}
.ph-id{font-size:11px;font-weight:600;color:var(--gris);}
.ph-fecha{font-size:10px;color:var(--gris);}
.ph-monto{font-size:13px;font-weight:700;}
.ph-estado{font-size:10px;color:var(--gris);margin-top:2px;}
.notas-textarea{width:100%;border:1px solid var(--borde);border-radius:6px;padding:8px 10px;font-family:"Poppins",sans-serif;font-size:12px;color:var(--black);outline:none;resize:none;background:#fff;margin-top:4px;}
.btn-guardar-nota{background:var(--black);color:#fff;border:none;padding:7px 14px;border-radius:6px;font-family:"Poppins",sans-serif;font-size:11px;font-weight:600;cursor:pointer;margin-top:6px;float:right;}
.ficha-empty{text-align:center;padding:40px;color:var(--borde);font-size:13px;}
.cumple-badge{display:inline-flex;align-items:center;gap:4px;background:#faeeda;color:var(--naranja);padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;margin-left:6px;}
</style>

<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">CRM Clientes</div>
      <div class="page-sub"><span id="totalClientes">0</span> clientas registradas</div>
    </div>
    <button onclick="exportarExcel()" style="background:var(--verde);color:#fff;border:none;padding:9px 18px;border-radius:8px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;">
      📊 Exportar Excel
    </button>
  </div>

  <div class="filtros-row">
    <button class="filtro-btn active" data-filtro="todas">Todas</button>
    <button class="filtro-btn" data-filtro="frecuentes">Frecuentes (+3 pedidos)</button>
    <button class="filtro-btn" data-filtro="lima">Lima</button>
    <button class="filtro-btn" data-filtro="provincia">Provincia</button>
    <input class="search-input" id="searchInput" placeholder="Buscar por nombre o DNI..." oninput="filtrar()"/>
  </div>

  <div class="layout">
    <div>
      <div class="tabla-wrap">
        <div class="tabla-header">
          <span>Cliente</span>

          <span style="text-align:center;">Total</span>
          <span style="text-align:center;">Última compra</span>
        </div>
        <div id="listaClientes"><div class="tabla-empty">Cargando clientas...</div></div>
      </div>
    </div>
    <div>

<script type="module">
import { initPage, db } from './nav.js';
import {
  collection, onSnapshot, query, where,
  doc, getDocs, updateDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const EMPRESA = 'sarcastica';
await initPage(['directora','operaciones','ventas']);

let todos = [];
let filtroActual = 'todas';
let clienteSeleccionado = null;

const CANAL_B = {
  WhatsApp:['badge-wa','WA'],
  Instagram:['badge-ig','IG'],
  Web:['badge-web','Web'],
};

// Cargar clientes y calcular totales desde pedidos
async function cargarClientes() {
  // Obtener todos los pedidos para calcular totales reales
  const pedidosSnap = await getDocs(collection(db,`empresas/${EMPRESA}/pedidos`));
  const pedidosPorCliente = {};
  pedidosSnap.forEach(d => {
    const p = d.data();
    const dni = p.cliente_dni;
    if (!dni) return;
    if (!pedidosPorCliente[dni]) pedidosPorCliente[dni] = {count:0, total:0, ultimoCanal:'', ultimaFecha:null};
    if (p.estado !== 'cancelado') {
      pedidosPorCliente[dni].count++;
      pedidosPorCliente[dni].total += (p.total||0);
    }
    if (!pedidosPorCliente[dni].ultimoCanal) pedidosPorCliente[dni].ultimoCanal = p.canal||'';
    if (!pedidosPorCliente[dni].ultimaFecha || (p.creadoEn?.seconds||0) > (pedidosPorCliente[dni].ultimaFecha?.seconds||0)) {
      pedidosPorCliente[dni].ultimaFecha = p.creadoEn;
      pedidosPorCliente[dni].ultimoPedidoEstado = p.estado;
      pedidosPorCliente[dni].ultimoPedidoId = d.id;
      pedidosPorCliente[dni].ultimoPedidoMonto = p.total||0;
    }
    // Canal preferido = primer canal registrado
    if (!pedidosPorCliente[dni].primerCanal) pedidosPorCliente[dni].primerCanal = p.canal||'';
  });

  const snap = await getDocs(collection(db,`empresas/${EMPRESA}/clientes`));
  todos = [];
  snap.forEach(d => {
    const c = d.data();
    const stats = pedidosPorCliente[d.id] || {count:0,total:0,primerCanal:'',ultimaFecha:null};
    todos.push({
      id: d.id,
      ...c,
      totalPedidos: stats.count,
      totalGastado: stats.total,
      canalPreferido: c.canalPreferido || stats.primerCanal || '',
      ultimoPedido: stats.ultimaFecha,
    });
  });
  document.getElementById('totalClientes').textContent = todos.length;
  filtrar();
}

window.filtrar = () => {
  const busq = document.getElementById('searchInput').value.toLowerCase();
  let lista = todos;
  if (filtroActual === 'frecuentes') lista = lista.filter(c => (c.totalPedidos||0) >= 3);
  else if (filtroActual === 'lima') lista = lista.filter(c => (c.provincia||'').toLowerCase().includes('lima'));
  else if (filtroActual === 'provincia') lista = lista.filter(c => !(c.provincia||'').toLowerCase().includes('lima'));
  if (busq) lista = lista.filter(c => (c.nombre||'').toLowerCase().includes(busq) || (c.id||'').includes(busq));
  renderTabla(lista);
};

document.querySelectorAll('.filtro-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filtroActual = btn.dataset.filtro;
    filtrar();
  });
});

function diasAtras(fecha) {
  if (!fecha) return '—';
  const date = fecha.toDate ? fecha.toDate() : new Date(fecha);
  const diff = Math.floor((Date.now() - date.getTime()) / 86400000);
  if (diff === 0) return 'hoy';
  if (diff === 1) return 'ayer';
  if (diff < 7) return `hace ${diff} días`;
  if (diff < 30) return `hace ${Math.floor(diff/7)} sem`;
  return date.toLocaleDateString('es-PE',{day:'numeric',month:'short'});
}

function esCumpleHoy(fechaNac) {
  if (!fechaNac) return false;
  const hoy = new Date();
  const [y,m,d] = fechaNac.split('-');
  return parseInt(m) === hoy.getMonth()+1 && parseInt(d) === hoy.getDate();
}

function renderTabla(lista) {
  const el = document.getElementById('listaClientes');
  if (!lista.length) { el.innerHTML = '<div class="tabla-empty">No hay clientas en este filtro</div>'; return; }
  el.innerHTML = lista.map(c => {
    const [bc,bl] = CANAL_B[c.canalPreferido] || ['badge-nd','—'];
    const ultimaCompra = diasAtras(c.ultimoPedido);
    const selected = clienteSeleccionado === c.id ? ' selected' : '';
    const cumple = esCumpleHoy(c.fechaNacimiento) ? '🎂' : '';
    return `<div class="tabla-row${selected}" onclick="seleccionarCliente('${c.id}')">
      <div>
        <div class="cl-nombre">${c.nombre||'—'} ${cumple}</div>
        <div class="cl-sub">${c.correo||''} · ${c.distrito||c.provincia||'—'}</div>
      </div>
      <span class="badge ${bc}">${bl}</span>
      <div class="num-center">${c.totalPedidos||0}</div>
      <div class="monto-center">S/ ${(c.totalGastado||0).toFixed(0)}</div>
      <div class="fecha-center">${ultimaCompra}</div>
    </div>`;
  }).join('');
}

window.seleccionarCliente = async (dni) => {
  clienteSeleccionado = dni;
  filtrar();
  const c = todos.find(x => x.id === dni);
  if (!c) return;

  const cumpleHoy = esCumpleHoy(c.fechaNacimiento);
  const cumpleBadge = cumpleHoy ? '<span class="cumple-badge">🎂 ¡Cumpleaños hoy!</span>' : '';

  const [bc,bl] = CANAL_B[c.canalPreferido] || ['badge-nd','—'];

  const ficha = document.getElementById('ficha');
  ficha.innerHTML = `
    <div class="ficha-header">
      <div class="ficha-nombre">${c.nombre||'—'} ${cumpleHoy?'🎂':''}</div>
      <div class="ficha-sub">DNI ${c.id||'—'} · ${c.distrito||''} ${c.provincia||''}</div>
    </div>
    <div class="ficha-body">
      <div class="ficha-sec">Contacto</div>
      <div class="ficha-grid">
        <div class="ficha-field"><div class="label">Teléfono</div><div class="value">${c.telefono||'—'}</div></div>
        <div class="ficha-field"><div class="label">Correo</div><div class="value" style="font-size:11px;">${c.correo||'—'}</div></div>
        <div class="ficha-field"><div class="label">Dirección</div><div class="value" style="font-size:11px;">${c.direccion||'—'}</div></div>
        <div class="ficha-field"><div class="label">Canal preferido</div><div class="value"><span class="badge ${bc}">${bl}</span></div></div>
        <div class="ficha-field"><div class="label">Fecha de nacimiento</div><div class="value">${c.fechaNacimiento||'—'}${cumpleBadge}</div></div>
      </div>
      <div class="ficha-sec">Resumen</div>
      <div class="ficha-grid">
        <div class="ficha-field"><div class="label">Total pedidos</div><div class="value">${c.totalPedidos||0}</div></div>
        <div class="ficha-field"><div class="label">Total gastado</div><div class="value" style="color:var(--verde)">S/ ${(c.totalGastado||0).toFixed(2)}</div></div>
      </div>
      <div class="ficha-sec">Historial de pedidos</div>
      <div id="historialPedidos">Cargando...</div>
      <div class="ficha-sec">Notas del equipo</div>
      <textarea class="notas-textarea" id="notasTextarea" rows="3" placeholder="Preferencias, situaciones especiales...">${c.notas||''}</textarea>
      <button class="btn-guardar-nota" onclick="guardarNota('${dni}')">Guardar nota</button>
      <div style="clear:both;"></div>
    </div>`;

  // Historial real desde pedidos
  const snap = await getDocs(query(
    collection(db,`empresas/${EMPRESA}/pedidos`),
    where('cliente_dni','==',dni)
  ));
  const hist = document.getElementById('historialPedidos');
  if (snap.empty) { hist.innerHTML = '<div style="font-size:12px;color:var(--borde);">Sin pedidos registrados</div>'; return; }
  const pedidos = snap.docs.map(d=>({id:d.id,...d.data()})).filter(p=>p.estado!=='cancelado');
  pedidos.sort((a,b) => (b.creadoEn?.seconds||0) - (a.creadoEn?.seconds||0));
  hist.innerHTML = pedidos.map(p => `
    <div class="pedido-hist">
      <div class="ph-top">
        <span class="ph-id">#${p.id.slice(-5).toUpperCase()}</span>
        <span class="ph-monto">S/ ${(p.total||0).toFixed(2)}</span>
      </div>
      <div class="ph-top">
        <span class="ph-fecha">${p.fechaEntrega||'—'} · ${p.canal||'—'} · ${p.medioPago||'—'}</span>
        <span class="ph-estado">${p.estado?.replace(/_/g,' ')||'—'}</span>
      </div>
    </div>`).join('');
};

window.guardarNota = async (dni) => {
  const nota = document.getElementById('notasTextarea').value;
  await updateDoc(doc(db,`empresas/${EMPRESA}/clientes`,dni),{
    notas: nota, notasActualizadasEn: serverTimestamp()
  });
  alert('✓ Nota guardada');
};

// Escuchar cambios en tiempo real
onSnapshot(collection(db,`empresas/${EMPRESA}/clientes`), () => cargarClientes());
cargarClientes();

window.exportarExcel = async () => {
  const pedidosSnap = await getDocs(collection(db,`empresas/${EMPRESA}/pedidos`));
  const pedidosPorCliente = {};
  pedidosSnap.forEach(d => {
    const p = d.data();
    if (!p.cliente_dni) return;
    if (!pedidosPorCliente[p.cliente_dni]) pedidosPorCliente[p.cliente_dni] = {count:0,total:0,primerCanal:'',pedidos:[]};
    pedidosPorCliente[p.cliente_dni].count++;
    pedidosPorCliente[p.cliente_dni].total += (p.total||0);
    if (!pedidosPorCliente[p.cliente_dni].primerCanal) pedidosPorCliente[p.cliente_dni].primerCanal = p.canal||'';
    pedidosPorCliente[p.cliente_dni].pedidos.push(d.id);
  });

  const snap = await getDocs(collection(db,`empresas/${EMPRESA}/clientes`));
  const rows = [['DNI','Nombre','Teléfono','Correo','Dirección','Distrito','Provincia','Canal preferido','Fecha de nacimiento','Total pedidos','Total gastado (S/)','Notas']];
  snap.forEach(d => {
    const c = d.data();
    const stats = pedidosPorCliente[d.id] || {count:0,total:0,primerCanal:''};
    rows.push([
      d.id,
      c.nombre||'',
      c.telefono||'',
      c.correo||'',
      c.direccion||'',
      c.distrito||'',
      c.provincia||'',
      c.canalPreferido || stats.primerCanal || '',
      c.fechaNacimiento||'',
      stats.count,
      stats.total.toFixed(2),
      c.notas||''
    ]);
  });

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);

  // Column widths
  ws['!cols'] = [
    {wch:12},{wch:28},{wch:14},{wch:28},{wch:30},
    {wch:14},{wch:14},{wch:14},{wch:16},{wch:12},{wch:16},{wch:30}
  ];

  // Header style
  const headerStyle = {font:{bold:true},fill:{fgColor:{rgb:'000000'}},font:{bold:true,color:{rgb:'FFFFFF'}}};
  ['A1','B1','C1','D1','E1','F1','G1','H1','I1','J1','K1','L1'].forEach(cell => {
    if (ws[cell]) ws[cell].s = {font:{bold:true,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'1A1A1A'}}};
  });

  XLSX.utils.book_append_sheet(wb, ws, 'Clientes');

};
