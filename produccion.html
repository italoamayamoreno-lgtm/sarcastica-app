<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Producción · Sarcástica OS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f1e8df;--black:#000;--rosa:#e1c4c1;--borde:#cca99d;--gris:#50504f;--verde:#3B6D11;--azul:#185FA5;--naranja:#854F0B;--rojo:#A32D2D;}
#app-nav{position:fixed;top:0;left:0;right:0;z-index:200;background:#000;display:flex;align-items:center;padding:0 20px;height:52px;border-bottom:2px solid #e1c4c1;font-family:"Poppins",sans-serif;}
#app-nav .nav-logo{display:flex;align-items:center;margin-right:16px;flex-shrink:0;text-decoration:none;}
#app-nav .nav-divider{width:1px;height:20px;background:#333;margin-right:8px;flex-shrink:0;}
#app-nav .nav-items{display:flex;gap:2px;flex:1;overflow-x:auto;}
#app-nav .nav-items::-webkit-scrollbar{display:none;}
#app-nav a.nav-link{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;color:#888;text-decoration:none;white-space:nowrap;}
#app-nav a.nav-link:hover{background:#111;color:#f1e8df;}
#app-nav a.nav-link.active{background:#e1c4c1;color:#000;font-weight:600;}
#app-nav .nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0;}
#app-nav .nav-powered{font-size:10px;color:#444;white-space:nowrap;}
#app-nav .nav-powered strong{color:#cca99d;}
#app-nav .nav-username{font-size:11px;color:#888;white-space:nowrap;}
#app-nav .btn-salir{background:none;border:1px solid #333;color:#888;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:"Poppins",sans-serif;font-size:11px;}
#app-nav .btn-salir:hover{border-color:#e1c4c1;color:#f1e8df;}
.nav-user-wrap{position:relative;}
#nav-menu-btn{display:flex;width:28px;height:28px;border-radius:50%;background:#e1c4c1;border:none;cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0;flex-shrink:0;}
#nav-menu-btn span{display:block;width:12px;height:1.5px;background:#000;border-radius:2px;}
#nav-menu-dropdown{display:none;position:absolute;top:38px;right:0;background:#fff;border:1.5px solid var(--borde);border-radius:10px;min-width:180px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:500;}
#nav-menu-dropdown.open{display:block;}
#nav-menu-dropdown a{display:block;padding:11px 16px;font-size:13px;color:var(--black);text-decoration:none;font-family:"Poppins",sans-serif;white-space:nowrap;}
#nav-menu-dropdown a:hover{background:var(--bg);}
#nav-menu-dropdown .menu-sep{height:1px;background:var(--borde);margin:4px 0;}
body{padding-top:52px;font-family:"Poppins",sans-serif;background:var(--bg);min-height:100vh;color:var(--black);}

.page{max-width:900px;margin:0 auto;padding:28px 24px;}
.page-title{font-size:20px;font-weight:800;}
.page-sub{font-size:12px;color:var(--gris);margin-top:3px;margin-bottom:20px;}

.metricas{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.metrica{background:#fff;border:1.5px solid var(--borde);border-radius:12px;padding:14px 16px;}
.metrica .ml{font-size:11px;color:var(--gris);text-transform:uppercase;letter-spacing:.06em;font-weight:500;margin-bottom:4px;}
.metrica .mv{font-size:26px;font-weight:800;line-height:1;}

.card{background:#fff;border:1.5px solid var(--borde);border-radius:12px;padding:18px;margin-bottom:12px;}
.card.listo{border-color:#b8dcb8;background:#f8fff5;}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.card-nombre{font-size:14px;font-weight:700;}
.card-meta{font-size:11px;color:var(--gris);margin-top:2px;}
.progress-wrap{height:5px;background:var(--bg);border-radius:10px;margin-bottom:12px;}
.progress-bar{height:5px;border-radius:10px;transition:width .3s;}

.item-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:10px 0;border-top:1px solid #f0e8e0;}
.item-row.bloqueado{opacity:.4;}
.item-info{flex:1;}
.item-nombre{font-size:13px;font-weight:600;}
.item-diseno{font-size:11px;color:var(--gris);margin-top:1px;}
.item-estado-label{font-size:10px;color:var(--gris);font-style:italic;margin-top:2px;}
.item-adicional-badge{display:inline-flex;align-items:center;gap:3px;background:#fff3cd;border:1px solid #ffc107;border-radius:5px;padding:2px 7px;margin-bottom:4px;}
.item-adicional-badge span{font-size:10px;font-weight:600;color:#856404;}

.estado-select{border-radius:20px;padding:6px 12px;font-family:"Poppins",sans-serif;font-size:11px;font-weight:600;cursor:pointer;outline:none;flex-shrink:0;}
.estado-select.pendiente{border:1.5px solid var(--naranja);background:#faeeda;color:var(--naranja);}
.estado-select.produccion{border:1.5px solid var(--azul);background:#e0eaf8;color:var(--azul);}
.estado-select.listo{border:1.5px solid var(--verde);background:#e8f5e0;color:var(--verde);}

.btn-merma{background:none;border:none;font-size:10px;color:var(--rojo);cursor:pointer;font-family:"Poppins",sans-serif;padding:0;margin-top:4px;display:block;}
.btn-merma:hover{text-decoration:underline;}
.btn-empaque{background:var(--black);color:#fff;border:none;padding:9px 18px;border-radius:8px;font-family:"Poppins",sans-serif;font-size:12px;font-weight:600;cursor:pointer;margin-top:10px;float:right;}
.clearfix::after{content:'';display:block;clear:both;}
.empty{text-align:center;padding:60px 0;color:var(--borde);font-size:13px;}

/* MODAL MERMA */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:16px;width:100%;max-width:480px;margin:20px;}
.modal-header{background:#000;border-radius:16px 16px 0 0;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-size:15px;font-weight:700;color:#fff;}
.modal-close{background:none;border:none;color:#666;font-size:22px;cursor:pointer;}
.modal-close:hover{color:#fff;}
.modal-body{padding:20px;}
.merma-item-info{background:var(--bg);border-radius:8px;padding:10px 14px;margin-bottom:14px;}
.merma-item-info strong{display:block;font-size:13px;font-weight:700;margin-bottom:2px;}
.merma-item-info span{font-size:11px;color:var(--gris);}
.causas{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.causa-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--borde);background:#fff;font-family:"Poppins",sans-serif;font-size:11px;color:var(--gris);cursor:pointer;}
.causa-btn.active{background:var(--rojo);color:#fff;border-color:var(--rojo);}
.merma-field{display:flex;flex-direction:column;gap:3px;margin-bottom:10px;}
.merma-field label{font-size:10px;font-weight:600;color:var(--gris);text-transform:uppercase;letter-spacing:.04em;}
.merma-field input{border:1px solid var(--borde);border-radius:6px;padding:7px 10px;font-family:"Poppins",sans-serif;font-size:12px;outline:none;}
.reasignar-box{background:#faeeda;border:1px solid #e8c99a;border-radius:8px;padding:12px;margin-top:8px;}
.reasignar-box .rtitle{font-size:11px;font-weight:600;color:var(--naranja);margin-bottom:6px;}
.reasignar-box .rstock{font-size:13px;font-weight:600;margin-bottom:8px;}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid var(--borde);border-radius:0 0 16px 16px;}
.btn-sec{background:#fff;border:1.5px solid var(--borde);color:var(--gris);padding:9px 16px;border-radius:8px;font-family:"Poppins",sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.btn-danger{background:var(--rojo);color:#fff;border:none;padding:9px 18px;border-radius:8px;font-family:"Poppins",sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.btn-danger:disabled{opacity:.4;cursor:not-allowed;}
</style>
</head>
<body>

<nav id="app-nav">
  <a href="inventario.html" class="nav-logo">
    <svg viewBox="0 0 200 36" xmlns="http://www.w3.org/2000/svg" height="20">

<div class="page">
  <div class="page-title">Producción</div>
  <div class="page-sub" id="pageSub"></div>

  <div class="metricas">
    <div class="metrica"><div class="ml">Pedidos</div><div class="mv" id="m-total">0</div></div>
    <div class="metrica"><div class="ml">Ítems pendientes</div><div class="mv" style="color:var(--naranja)" id="m-pend">0</div></div>
    <div class="metrica"><div class="ml">En producción</div><div class="mv" style="color:var(--azul)" id="m-prod">0</div></div>
    <div class="metrica"><div class="ml">Listos</div><div class="mv" style="color:var(--verde)" id="m-listo">0</div></div>
  </div>

  <div id="listaPedidos"><div class="empty">Cargando pedidos...</div></div>
</div>

<!-- MODAL MERMA -->
<div class="modal-overlay" id="modalMerma">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">⚠ Registrar merma</span>
      <button class="modal-close" id="btnCerrarMerma">×</button>
    </div>

      <div class="merma-item-info">
        <strong id="mermaItemNombre">—</strong>

      <div class="causas">
        <button class="causa-btn" data-causa="Falla de sublimado">Falla de sublimado</button>
        <button class="causa-btn" data-causa="Falla de estampado">Falla de estampado</button>
        <button class="causa-btn" data-causa="Defecto del insumo">Defecto del insumo</button>

      <button class="btn-danger" id="btnConfirmarMerma">Confirmar merma</button>

</div>

<script type="module">
import { initPage, db } from './nav.js';
import {
  collection, onSnapshot,
  doc, getDoc, getDocs, updateDoc, addDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const EMPRESA = 'sarcastica';
const user = await initPage(['directora','operaciones','produccion']);

document.getElementById('pageSub').textContent =
  new Date().toLocaleDateString('es-PE',{weekday:'long',day:'numeric',month:'long'});

// Merma state
let mermaActual = {};
let causaSeleccionada = '';

// ---- RENDER ----
function renderCard(p) {
  const pid = p.id;
  const items = p.items || [];

  const activos = items.filter(i => ['pendiente','produccion','listo_empaque'].includes(i.estado));
  const listos  = items.filter(i => i.estado === 'listo_empaque').length;
  const pct     = activos.length > 0 ? Math.round((listos/activos.length)*100) : 0;
  const todosListos = items.every(i =>
    ['listo_empaque','empaquetado','en_ruta','entregado'].includes(i.estado)
  );
  const barColor = todosListos ? 'var(--verde)' : pct > 0 ? 'var(--azul)' : 'var(--borde)';

  const itemsHtml = items.map(item => {
    const esActivo = ['pendiente','produccion','listo_empaque'].includes(item.estado);
    const esPend   = item.estado === 'pendiente';
    const esProd   = item.estado === 'produccion';
    const esListo  = item.estado === 'listo_empaque';

    const ESTADO_TEXTO = {
      empaquetado:'Empaquetado 📦', en_ruta:'En ruta 🚚', entregado:'Entregado ✓',
      pendiente_validacion_adicional:'⏳ Pendiente validación',dañado:'⚠ Dañado',
    };

    if (!esActivo) {
      return `<div class="item-row bloqueado">
        <div class="item-info">
          <div class="item-nombre">${item.productoNombre||'—'}</div>
          <div class="item-diseno">${item.diseno||''}</div>
          <div class="item-estado-label">${ESTADO_TEXTO[item.estado]||item.estado}</div>
        </div>
      </div>`;
    }

    const selClass = esPend ? 'pendiente' : esProd ? 'produccion' : 'listo';
    const adicBadge = item.esAdicional
      ? `<div class="item-adicional-badge"><span>⚡ Ítem adicional — ${item.agregadoPor||'ventas'}</span></div>`
      : '';

    return `<div class="item-row" id="itemrow-${pid}-${item.id}">
      <div class="item-info">
        ${adicBadge}
        <div class="item-nombre">${item.productoNombre||'—'}</div>
        <div class="item-diseno">${item.diseno||''}</div>
        <button class="btn-merma" onclick="abrirMerma('${pid}','${item.id}','${item.productoId||''}','${(item.productoNombre||'').replace(/'/g,"\\'")}','${(item.diseno||'').replace(/'/g,"\\'")}')">⚠ Registrar merma</button>
      </div>
      <select class="estado-select ${selClass}" onchange="cambiarEstado('${pid}','${item.id}',this)">
        <option value="pendiente"     ${esPend ?'selected':''}>Pendiente</option>
        <option value="produccion"    ${esProd ?'selected':''}>En producción</option>
        <option value="listo_empaque" ${esListo?'selected':''}>Listo ✓</option>
      </select>
    </div>`;
  }).join('');

  const btnEmpaque = todosListos
    ? `<button class="btn-empaque" onclick="confirmarEmpaque('${pid}','${(p.cliente_nombre||'').replace(/'/g,"\\'")}')">Pasar a empaque →</button>`
    : '';

  return `<div class="card${todosListos?' listo':''}" id="card-${pid}">
    <div class="card-header">
      <div>
        <div class="card-nombre">${p.cliente_nombre||'—'}</div>
        <div class="card-meta">${[p.distrito,p.provincia].filter(Boolean).join(' · ')} · Entrega: ${p.fechaEntrega||'—'}</div>
      </div>
      <span style="font-size:12px;color:var(--gris);">${listos}/${activos.length} listos</span>
    </div>
    <div class="progress-wrap"><div class="progress-bar" style="background:${barColor};width:${pct}%"></div></div>
    ${itemsHtml}
    <div class="clearfix">${btnEmpaque}</div>
  </div>`;
}

// ---- FIRESTORE ----
// Carga optimizada: escuchar pedidos, cargar items solo una vez al inicio
// luego re-cargar solo cuando el pedido cambia
const pedidosMap = {};
let renderTimeout = null;

function scheduleRender() {
  clearTimeout(renderTimeout);
  renderTimeout = setTimeout(renderAll, 400);
}

function renderAll() {
  const lista = document.getElementById('listaPedidos');
  const activos = Object.values(pedidosMap).filter(p =>
    (p.items||[]).some(i => ['pendiente','produccion','listo_empaque'].includes(i.estado))
  );

  if (activos.length === 0) {
    lista.innerHTML = '<div class="empty">No hay pedidos en producción</div>';
    document.getElementById('m-total').textContent = 0;
    document.getElementById('m-pend').textContent = 0;
    document.getElementById('m-prod').textContent = 0;
    document.getElementById('m-listo').textContent = 0;
    return;
  }

  let totalPend=0, totalProd=0, totalListo=0;
  activos.forEach(p => (p.items||[]).forEach(i => {
    if (i.estado==='pendiente') totalPend++;
    else if (i.estado==='produccion') totalProd++;
    else if (i.estado==='listo_empaque') totalListo++;
  }));

  document.getElementById('m-total').textContent = activos.length;
  document.getElementById('m-pend').textContent = totalPend;
  document.getElementById('m-prod').textContent = totalProd;
  document.getElementById('m-listo').textContent = totalListo;
  lista.innerHTML = activos.map(p => renderCard(p)).join('');
}

// Escuchar pedidos
onSnapshot(collection(db,`empresas/${EMPRESA}/pedidos`), snap => {
  snap.docChanges().forEach(change => {
    const pid = change.doc.id;
    if (change.type === 'removed') {
      delete pedidosMap[pid];
    } else {
      // Merge data, preservar items si ya los tenemos
      pedidosMap[pid] = {
        ...(pedidosMap[pid]||{}),
        ...change.doc.data(),
        id: pid,
      };
      // Cargar items de este pedido
      getDocs(collection(db,`empresas/${EMPRESA}/pedidos/${pid}/items`)).then(snap => {
        const items = [];
        snap.forEach(i => items.push({id:i.id,...i.data()}));
        pedidosMap[pid].items = items;
        scheduleRender();
      });
    }
  });
  scheduleRender();
});

// ---- ACCIONES ----
window.cambiarEstado = async (pedidoId, itemId, sel) => {
  const nuevoEstado = sel.value;
  const claseAnterior = sel.className;
  sel.disabled = true;
  // Actualizar clase visual inmediatamente
  sel.className = `estado-select ${nuevoEstado === 'pendiente' ? 'pendiente' : nuevoEstado === 'produccion' ? 'produccion' : 'listo'}`;
  try {
    await updateDoc(doc(db,`empresas/${EMPRESA}/pedidos/${pedidoId}/items`,itemId), {estado:nuevoEstado});
    // Actualizar cache local
    if (pedidosMap[pedidoId]) {
      const item = (pedidosMap[pedidoId].items||[]).find(i => i.id === itemId);
      if (item) { item.estado = nuevoEstado; scheduleRender(); }
    }
  } catch(e) {
    console.error(e);
    sel.className = claseAnterior;
    alert('Error al actualizar estado.');
  } finally {
    sel.disabled = false;
  }
};

window.confirmarEmpaque = (pedidoId, clienteNombre) => {
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:600;display:flex;align-items:center;justify-content:center;';
  div.innerHTML = `<div style="background:#fff;border-radius:16px;padding:28px;max-width:380px;width:90%;text-align:center;">
    <div style="font-size:32px;margin-bottom:10px;">📦</div>
    <div style="font-size:15px;font-weight:700;margin-bottom:8px;">¿Pasar a empaque?</div>
    <div style="font-size:13px;color:var(--gris);margin-bottom:20px;">Pedido de <strong>${clienteNombre}</strong><br>¿Confirmas que <strong>todos los ítems están listos</strong>?</div>
    <div style="display:flex;gap:8px;justify-content:center;">
      <button id="bNo" style="background:#fff;border:1.5px solid var(--borde);color:var(--gris);padding:9px 18px;border-radius:8px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;cursor:pointer;">Cancelar</button>
      <button id="bSi" style="background:var(--black);color:#fff;border:none;padding:9px 18px;border-radius:8px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;cursor:pointer;">Sí, pasar a empaque →</button>
    </div>
  </div>`;
  document.body.appendChild(div);
  div.querySelector('#bNo').onclick = () => div.remove();
  div.querySelector('#bSi').onclick = async () => {
    div.remove();
    try {
      // Siempre actualizar a en_empaque independientemente del estado actual
      await updateDoc(doc(db,`empresas/${EMPRESA}/pedidos`,pedidoId), {
        estado:'en_empaque', pasadoEmpaqueEn:serverTimestamp()
      });
      // Marcar ítems listo_empaque → mantenemos como listo_empaque para que empaque los procese
    } catch(e) {
      console.error(e); alert('Error al pasar a empaque.');
    }
  };
};

// ---- MERMA ----
window.abrirMerma = async (pedidoId, itemId, productoId, nombre, diseno) => {
  mermaActual = {pedidoId, itemId, productoId, nombre, diseno, disponible:0};
  causaSeleccionada = '';
  document.querySelectorAll('.causa-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mermaDetalle').value = '';
  document.getElementById('mermaReasignar').checked = false;
  document.getElementById('mermaItemNombre').textContent = nombre;
  document.getElementById('mermaItemDiseno').textContent = diseno || 'Sin diseño';
  if (productoId) {
    const snap = await getDoc(doc(db,`empresas/${EMPRESA}/inventario_crudos`,productoId));
    if (snap.exists()) {
      mermaActual.disponible = snap.data().disponible || 0;
      document.getElementById('mermaStockInfo').textContent =
        `${mermaActual.disponible} unidades disponibles`;
    }
  }
  document.getElementById('modalMerma').classList.add('open');
};

['btnCerrarMerma','btnCancelarMerma'].forEach(id => {
  document.getElementById(id).onclick = () =>
    document.getElementById('modalMerma').classList.remove('open');
});

document.querySelectorAll('.causa-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.causa-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    causaSeleccionada = btn.dataset.causa;
  });
});

document.getElementById('btnConfirmarMerma').onclick = async () => {
  if (!causaSeleccionada) { alert('Selecciona la causa.'); return; }
  const btn = document.getElementById('btnConfirmarMerma');
  btn.disabled = true; btn.textContent = 'Procesando...';
  const reasignar = document.getElementById('mermaReasignar').checked;
  try {
    if (mermaActual.productoId) {
      const invRef = doc(db,`empresas/${EMPRESA}/inventario_crudos`,mermaActual.productoId);
      const invSnap = await getDoc(invRef);
      if (invSnap.exists()) {
        const inv = invSnap.data();
        const upd = {total:Math.max(0,(inv.total||0)-1), consumido:(inv.consumido||0)+1};
        if (reasignar) {
          upd.disponible = Math.max(0,(inv.disponible||0)-1);
          upd.reservado  = (inv.reservado||0)+1;
        }
        await updateDoc(invRef, upd);
      }
    }
    await addDoc(collection(db,`empresas/${EMPRESA}/movimientos`),{
      tipo:'merma', productoId:mermaActual.productoId, productoNombre:mermaActual.nombre,
      pedidoId:mermaActual.pedidoId, itemId:mermaActual.itemId, diseno:mermaActual.diseno,
      causa:causaSeleccionada, detalle:document.getElementById('mermaDetalle').value.trim(),
      reasignado:reasignar, registradoPor:user.nombre||user.email,
      fecha:new Date().toISOString().split('T')[0], creadoEn:serverTimestamp()
    });
    await updateDoc(
      doc(db,`empresas/${EMPRESA}/pedidos/${mermaActual.pedidoId}/items`,mermaActual.itemId),
      {estado: reasignar ? 'produccion' : 'dañado', merma:true, causaMerma:causaSeleccionada}
    );
    document.getElementById('modalMerma').classList.remove('open');
    alert(reasignar
      ? '✓ Merma registrada. Nuevo insumo reservado, el ítem continúa en producción.'
      : '✓ Merma registrada. Ítem marcado como dañado.');
  } catch(e) {
    console.error(e); alert('Error al registrar merma.');
  } finally {
    btn.disabled = false; btn.textContent = 'Confirmar merma';
  }
};
</script>
</body>
</html>
