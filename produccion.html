<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Producción · Sarcástica OS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f1e8df;--black:#000;--rosa:#e1c4c1;--borde:#cca99d;--gris:#50504f;--verde:#3B6D11;--azul:#185FA5;--naranja:#854F0B;--rojo:#A32D2D;}
#app-nav{position:fixed;top:0;left:0;right:0;z-index:200;background:#000;display:flex;align-items:center;padding:0 20px;height:52px;border-bottom:2px solid #e1c4c1;font-family:"Poppins",sans-serif;}
#app-nav .nav-logo{display:flex;align-items:center;margin-right:16px;flex-shrink:0;text-decoration:none;}
#app-nav .nav-divider{width:1px;height:20px;background:#333;margin-right:8px;flex-shrink:0;}
#app-nav .nav-items{display:flex;gap:2px;flex:1;overflow-x:auto;}
#app-nav .nav-items::-webkit-scrollbar{display:none;}
#app-nav a.nav-link{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;color:#888;text-decoration:none;white-space:nowrap;transition:background .15s,color .15s;}
#app-nav a.nav-link:hover{background:#111;color:#f1e8df;}
#app-nav a.nav-link.active{background:#e1c4c1;color:#000;font-weight:600;}
#app-nav .nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0;}
#app-nav .nav-powered{font-size:10px;color:#444;letter-spacing:.04em;white-space:nowrap;}
#app-nav .nav-powered strong{color:#cca99d;}
#app-nav .nav-username{font-size:11px;color:#888;white-space:nowrap;}
#app-nav .btn-salir{background:none;border:1px solid #333;color:#888;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:"Poppins",sans-serif;font-size:11px;white-space:nowrap;}
#app-nav .btn-salir:hover{border-color:#e1c4c1;color:#f1e8df;}
.nav-user-wrap{position:relative;}
#nav-menu-btn{display:flex;width:28px;height:28px;border-radius:50%;background:#e1c4c1;border:none;cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0;flex-shrink:0;}
#nav-menu-btn span{display:block;width:12px;height:1.5px;background:#000;border-radius:2px;}
#nav-menu-dropdown{display:none;position:absolute;top:38px;right:0;background:#fff;border:1.5px solid var(--borde);border-radius:10px;min-width:180px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:500;}
#nav-menu-dropdown.open{display:block;}
#nav-menu-dropdown a{display:block;padding:11px 16px;font-size:13px;color:var(--black);text-decoration:none;font-family:"Poppins",sans-serif;white-space:nowrap;}
#nav-menu-dropdown a:hover{background:var(--bg);}
#nav-menu-dropdown .menu-sep{height:1px;background:var(--borde);margin:4px 0;}
body{padding-top:52px;font-family:"Poppins",sans-serif;background:var(--bg);min-height:100vh;color:var(--black);}

.page{max-width:900px;margin:0 auto;padding:28px 24px;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.page-title{font-size:20px;font-weight:800;}
.page-sub{font-size:12px;color:var(--gris);margin-top:3px;}
.btn-merma{background:#fff;border:1.5px solid var(--rojo);color:var(--rojo);padding:8px 16px;border-radius:8px;font-family:"Poppins",sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.btn-merma:hover{background:var(--rojo);color:#fff;}

/* MÉTRICAS */
.metricas{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.metrica{background:#fff;border:1.5px solid var(--borde);border-radius:12px;padding:14px 16px;}
.metrica .ml{font-size:11px;color:var(--gris);text-transform:uppercase;letter-spacing:.06em;font-weight:500;margin-bottom:4px;}
.metrica .mv{font-size:26px;font-weight:800;line-height:1;}
.metrica .ms{font-size:11px;color:var(--gris);margin-top:3px;}

/* CARDS PEDIDO */
.card{background:#fff;border:1.5px solid var(--borde);border-radius:12px;padding:18px;margin-bottom:12px;}
.card.listo{border-color:#b8dcb8;background:#f8fff5;}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.card-nombre{font-size:14px;font-weight:700;}
.card-meta{font-size:11px;color:var(--gris);margin-top:2px;}
.card-progreso-label{font-size:12px;color:var(--gris);white-space:nowrap;}

/* BARRA DE PROGRESO */
.progress-wrap{background:var(--bg);border-radius:20px;height:5px;margin-bottom:12px;}
.progress-bar{border-radius:20px;height:5px;transition:width .3s;}

/* ITEMS */
.item-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:1px solid #f0e8e0;}
.item-info .item-nombre{font-size:13px;font-weight:600;}
.item-info .item-diseno{font-size:11px;color:var(--gris);margin-top:1px;}
.item-estado-btn{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:"Poppins",sans-serif;transition:all .15s;}
.item-btn-pend{background:#faeeda;color:var(--naranja);}
.item-btn-pend:hover{background:var(--naranja);color:#fff;}
.item-btn-prod{background:#e0eaf8;color:var(--azul);}
.item-btn-prod:hover{background:var(--azul);color:#fff;}
.item-btn-listo{background:#e8f5e0;color:var(--verde);cursor:default;}

/* BTN EMPAQUE */
.btn-empaque{background:var(--black);color:#fff;border:none;padding:9px 18px;border-radius:8px;font-family:"Poppins",sans-serif;font-size:12px;font-weight:600;cursor:pointer;margin-top:12px;float:right;}
.btn-empaque:hover{opacity:.8;}
.clearfix::after{content:'';display:block;clear:both;}

.empty{text-align:center;padding:60px 0;color:var(--borde);font-size:13px;}

/* MODAL MERMA */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;padding:20px;overflow-y:auto;}
.modal-overlay.open{display:flex;justify-content:center;align-items:flex-start;}
.modal{background:#fff;border-radius:16px;width:100%;max-width:520px;margin:auto;}
.modal-header{background:#000;border-radius:16px 16px 0 0;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-size:15px;font-weight:700;color:#fff;}
.modal-close{background:none;border:none;color:#666;font-size:22px;cursor:pointer;line-height:1;}
.modal-close:hover{color:#fff;}
.modal-body{padding:20px;}
.sec-label{font-size:9px;font-weight:600;color:var(--borde);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;}
.form-card{background:var(--bg);border:1px solid var(--borde);border-radius:10px;padding:14px;margin-bottom:12px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.field{display:flex;flex-direction:column;gap:3px;}
.field label{font-size:10px;font-weight:600;color:var(--gris);text-transform:uppercase;letter-spacing:.04em;}
.field input,.field select,.field textarea{background:#fff;border:1px solid var(--borde);border-radius:6px;padding:7px 10px;font-family:"Poppins",sans-serif;font-size:12px;color:var(--black);outline:none;width:100%;}
.causas{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.causa-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--borde);background:#fff;font-family:"Poppins",sans-serif;font-size:11px;color:var(--gris);cursor:pointer;}
.causa-btn.active{background:var(--rojo);color:#fff;border-color:var(--rojo);}
.alerta-merma{background:#fcebeb;border:1px solid #f0c0c0;border-radius:8px;padding:10px 14px;font-size:12px;color:var(--rojo);margin-bottom:12px;display:none;}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid var(--borde);background:#faf5f0;border-radius:0 0 16px 16px;}
.btn-sec{background:#fff;border:1.5px solid var(--borde);color:var(--gris);padding:9px 16px;border-radius:8px;font-family:"Poppins",sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.btn-danger{background:var(--rojo);color:#fff;border:none;padding:9px 18px;border-radius:8px;font-family:"Poppins",sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.btn-danger:disabled{opacity:.4;cursor:not-allowed;}
</style>
</head>
<body>

<nav id="app-nav">
  <a href="inventario.html" class="nav-logo">
    <svg viewBox="0 0 200 36" xmlns="http://www.w3.org/2000/svg" height="20"><text x="0" y="29" font-family="Georgia,serif" font-size="29" font-weight="400" fill="#ffffff" letter-spacing="-0.5">sarcástica.</text></svg>
  </a>
  <div class="nav-divider"></div>
  <div class="nav-items">
    <a href="inventario.html" class="nav-link" data-page="inventario">Inventario</a>
    <a href="pedidos.html"    class="nav-link" data-page="pedidos">Pedidos</a>
    <a href="validar.html"    class="nav-link" data-page="validar">Validar Pagos</a>
    <a href="produccion.html" class="nav-link active" data-page="produccion">Producción</a>
    <a href="empaque.html"    class="nav-link" data-page="empaque">Empaque</a>
    <a href="ruta.html"       class="nav-link" data-page="ruta">Ruta</a>
    <a href="clientes.html"   class="nav-link" data-page="clientes">CRM</a>
  </div>
  <div class="nav-right">
    <span class="nav-powered">powered by <strong>Etrazia</strong></span>
    <span class="nav-username" id="nav-rol"></span>
    <div class="nav-user-wrap">
      <button id="nav-menu-btn"><span></span><span></span><span></span></button>
      <div id="nav-menu-dropdown">
        <a href="dashboard.html">Dashboard</a>
        <a href="clientes.html">CRM Clientes</a>
        <div class="menu-sep"></div>
        <a href="configuracion.html">Configuración</a>
      </div>
    </div>
    <button class="btn-salir" id="btn-salir">Salir</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Producción</div>
      <div class="page-sub" id="pageSub"></div>
    </div>
    <button class="btn-merma" id="btnMerma">⚠ Registrar merma</button>
  </div>

  <div class="metricas">
    <div class="metrica">
      <div class="ml">Pedidos hoy</div>
      <div class="mv" id="m-total">—</div>
      <div class="ms">en producción</div>
    </div>
    <div class="metrica">
      <div class="ml">Ítems pendientes</div>
      <div class="mv" style="color:var(--naranja)" id="m-pend">—</div>
      <div class="ms">sin iniciar</div>
    </div>
    <div class="metrica">
      <div class="ml">En producción</div>
      <div class="mv" style="color:var(--azul)" id="m-prod">—</div>
      <div class="ms">fabricando</div>
    </div>
    <div class="metrica">
      <div class="ml">Listos</div>
      <div class="mv" style="color:var(--verde)" id="m-listo">—</div>
      <div class="ms">terminados</div>
    </div>
  </div>

  <div id="listaPedidos"><div class="empty">Cargando pedidos...</div></div>
</div>

<!-- MODAL MERMA -->
<div class="modal-overlay" id="modalMerma">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Registrar merma</div>
      <button class="modal-close" id="btnCerrarMerma">×</button>
    </div>
    <div class="modal-body">
      <div class="form-card">
        <div class="sec-label">Ítem dañado</div>
        <div class="g2">
          <div class="field">
            <label>Producto y variante</label>
            <select id="m-producto">
              <option value="">Seleccionar insumo</option>
            </select>
          </div>
          <div class="field">
            <label>Cantidad dañada</label>
            <input type="number" id="m-cantidad" min="1" value="1"/>
          </div>
        </div>
        <div class="field">
          <label>Causa de la merma</label>
          <div class="causas" id="causas">
            <button class="causa-btn" data-causa="Falla de sublimado">Falla de sublimado</button>
            <button class="causa-btn" data-causa="Falla de estampado">Falla de estampado</button>
            <button class="causa-btn" data-causa="Defecto del insumo">Defecto del insumo</button>
            <button class="causa-btn" data-causa="Error de troquelado">Error de troquelado</button>
            <button class="causa-btn" data-causa="Otro">Otro</button>
          </div>
        </div>
        <div class="field" style="margin-top:10px;">
          <label>Detalle adicional (opcional)</label>
          <input type="text" id="m-detalle" placeholder="Ej: burbuja en la cara del vaso"/>
        </div>
      </div>
      <div class="alerta-merma" id="alertaMerma"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-sec" id="btnCancelarMerma">Cancelar</button>
      <button class="btn-danger" id="btnConfirmarMerma">Confirmar merma — descontar inventario</button>
    </div>
  </div>
</div>

<script type="module">
import { initPage, db } from './nav.js';
import {
  collection, query, where, onSnapshot, orderBy,
  doc, getDoc, getDocs, updateDoc, addDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const EMPRESA = 'sarcastica';
const user = await initPage(['directora','operaciones','produccion']);

const hoy = new Date();
document.getElementById('pageSub').textContent =
  hoy.toLocaleDateString('es-PE',{weekday:'long',day:'numeric',month:'long'}) + ' · un pedido por cliente';

let causaSeleccionada = '';
let todosItems = []; // para métricas

// Cargar pedidos en_produccion en tiempo real
const q = query(
  collection(db,`empresas/${EMPRESA}/pedidos`),
  where('estado','==','en_produccion'),
  orderBy('fechaEntrega','asc')
);

onSnapshot(q, async snap => {
  const lista = document.getElementById('listaPedidos');
  if (snap.empty) {
    lista.innerHTML = '<div class="empty">No hay pedidos en producción</div>';
    actualizarMetricas([]);
    return;
  }

  // Cargar items de todos los pedidos
  const pedidos = [];
  for (const d of snap.docs) {
    const itemsSnap = await getDocs(collection(db,`empresas/${EMPRESA}/pedidos/${d.id}/items`));
    const items = [];
    itemsSnap.forEach(i => items.push({ id:i.id, ...i.data() }));
    pedidos.push({ id:d.id, ...d.data(), items });
  }

  actualizarMetricas(pedidos);
  lista.innerHTML = pedidos.map(p => renderCard(p)).join('');
});

function actualizarMetricas(pedidos) {
  let pend=0, prod=0, listo=0;
  pedidos.forEach(p => p.items.forEach(i => {
    if (i.estado==='pendiente') pend++;
    else if (i.estado==='produccion') prod++;
    else if (i.estado==='listo_empaque') listo++;
  }));
  document.getElementById('m-total').textContent = pedidos.length;
  document.getElementById('m-pend').textContent  = pend;
  document.getElementById('m-prod').textContent  = prod;
  document.getElementById('m-listo').textContent = listo;
}

function renderCard(p) {
  const total  = p.items.length;
  const listos = p.items.filter(i => i.estado==='listo_empaque').length;
  const todosListos = listos === total && total > 0;
  const pct = total > 0 ? Math.round((listos/total)*100) : 0;
  const barColor = todosListos ? 'var(--verde)' : pct > 0 ? 'var(--azul)' : 'var(--borde)';

  const itemsHtml = p.items.map(i => {
    const esPend  = i.estado === 'pendiente';
    const esProd  = i.estado === 'produccion';
    const esListo = i.estado === 'listo_empaque';
    const btnClass = esPend ? 'item-btn-pend' : esProd ? 'item-btn-prod' : 'item-btn-listo';
    const btnLabel = esPend ? 'Pendiente — iniciar' : esProd ? 'En producción — marcar listo' : '✓ Listo';
    const btnClick = esListo ? '' : `onclick="avanzarItem('${p.id}','${i.id}','${i.estado}')"`;
    return `<div class="item-row">
      <div class="item-info">
        <div class="item-nombre">${i.productoNombre||'—'}${i.variante?' · '+i.variante:''}</div>
        <div class="item-diseno">${i.diseno||''}</div>
      </div>
      <button class="item-estado-btn ${btnClass}" ${btnClick}>${btnLabel}</button>
    </div>`;
  }).join('');

  const btnEmpaqueHtml = todosListos
    ? `<button class="btn-empaque" onclick="pasarEmpaque('${p.id}')">Pasar a empaque →</button>`
    : '';

  return `<div class="card${todosListos?' listo':''}" id="card-${p.id}">
    <div class="card-header">
      <div>
        <div class="card-nombre">${p.cliente_nombre||'—'}</div>
        <div class="card-meta">${[p.distrito,p.provincia].filter(Boolean).join(' · ')} · Entrega: ${p.fechaEntrega||'—'}</div>
      </div>
      <span class="card-progreso-label">${listos}/${total} listos</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" style="background:${barColor};width:${pct}%"></div>
    </div>
    ${itemsHtml}
    <div class="clearfix">${btnEmpaqueHtml}</div>
  </div>`;
}

// Avanzar estado de ítem: pendiente → produccion → listo_empaque
window.avanzarItem = async (pedidoId, itemId, estadoActual) => {
  const siguiente = estadoActual === 'pendiente' ? 'produccion' : 'listo_empaque';
  await updateDoc(
    doc(db,`empresas/${EMPRESA}/pedidos/${pedidoId}/items`,itemId),
    { estado: siguiente }
  );
};

// Pasar pedido completo a empaque
window.pasarEmpaque = async (pedidoId) => {
  await updateDoc(doc(db,`empresas/${EMPRESA}/pedidos`,pedidoId), {
    estado: 'en_empaque',
    pasadoEmpaqueEn: serverTimestamp(),
  });
};

// ---- MODAL MERMA ----
// Cargar productos para el selector
async function cargarProductosMerma() {
  const snap = await getDocs(collection(db,`empresas/${EMPRESA}/inventario_crudos`));
  const sel = document.getElementById('m-producto');
  sel.innerHTML = '<option value="">Seleccionar insumo</option>';
  snap.forEach(d => {
    const p = d.data();
    const opt = document.createElement('option');
    opt.value = d.id;
    opt.textContent = `${p.nombre||'—'}${p.variante?' · '+p.variante:''}`;
    opt.dataset.disponible = p.disponible || 0;
    opt.dataset.total = p.total || 0;
    sel.appendChild(opt);
  });
}

document.getElementById('btnMerma').onclick = async () => {
  await cargarProductosMerma();
  causaSeleccionada = '';
  document.querySelectorAll('.causa-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('m-cantidad').value = 1;
  document.getElementById('m-detalle').value = '';
  document.getElementById('alertaMerma').style.display = 'none';
  document.getElementById('modalMerma').classList.add('open');
};

document.getElementById('btnCerrarMerma').onclick =
document.getElementById('btnCancelarMerma').onclick = () =>
  document.getElementById('modalMerma').classList.remove('open');

document.querySelectorAll('.causa-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.causa-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    causaSeleccionada = btn.dataset.causa;
  });
});

document.getElementById('btnConfirmarMerma').onclick = async () => {
  const prodId   = document.getElementById('m-producto').value;
  const cantidad = parseInt(document.getElementById('m-cantidad').value) || 0;
  const detalle  = document.getElementById('m-detalle').value.trim();

  if (!prodId)            { alert('Selecciona el producto dañado.'); return; }
  if (!causaSeleccionada) { alert('Selecciona la causa de la merma.'); return; }
  if (cantidad < 1)       { alert('La cantidad debe ser al menos 1.'); return; }

  const btn = document.getElementById('btnConfirmarMerma');
  btn.disabled = true; btn.textContent = 'Procesando...';

  try {
    const invRef  = doc(db,`empresas/${EMPRESA}/inventario_crudos`,prodId);
    const invSnap = await getDoc(invRef);
    if (!invSnap.exists()) throw new Error('Producto no encontrado');
    const inv = invSnap.data();

    await updateDoc(invRef, {
      total:     Math.max(0, (inv.total||0) - cantidad),
      consumido: (inv.consumido||0) + cantidad,
    });

    await addDoc(collection(db,`empresas/${EMPRESA}/movimientos`), {
      tipo:        'merma',
      productoId:  prodId,
      productoNombre: inv.nombre||'—',
      cantidad,
      causa:       causaSeleccionada,
      detalle,
      registradoPor: user.nombre||user.email,
      fecha:       new Date().toISOString().split('T')[0],
      creadoEn:    serverTimestamp(),
    });

    document.getElementById('modalMerma').classList.remove('open');
    alert('✓ Merma registrada. Inventario actualizado.');
  } catch(e) {
    console.error(e);
    alert('Error al registrar. Intenta de nuevo.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Confirmar merma — descontar inventario';
  }
};
</script>
</body>
</html>
