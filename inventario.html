<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inventario · Sarcástica OS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f1e8df;--black:#000;--rosa:#e1c4c1;--borde:#cca99d;--gris:#50504f;--verde:#3B6D11;--rojo:#A32D2D;--naranja:#854F0B;}
body{font-family:'Poppins',sans-serif;background:var(--bg);min-height:100vh;color:var(--black);}
.page{max-width:1100px;margin:0 auto;padding:32px 24px;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.page-title{font-size:22px;font-weight:800;}
.btn-primary{background:var(--black);color:#fff;border:none;padding:10px 20px;border-radius:8px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.tabla-wrap{background:#fff;border:1.5px solid var(--borde);border-radius:12px;overflow:hidden;}
.tabla{width:100%;border-collapse:collapse;}
.tabla th{padding:12px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--gris);text-transform:uppercase;letter-spacing:.06em;background:#faf5f0;border-bottom:1px solid var(--borde);}
.tabla td{padding:14px 16px;font-size:13px;border-bottom:1px solid #f0e8e0;vertical-align:middle;}
.tabla tr:last-child td{border-bottom:none;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-ok{background:#e8f5e0;color:var(--verde);}
.badge-warn{background:#faeeda;color:var(--naranja);}
.badge-low{background:#fcebeb;color:var(--rojo);}
.empty{text-align:center;padding:60px 0;color:var(--borde);}
.empty-icon{font-size:36px;margin-bottom:8px;}
.coming{background:#fff;border:1.5px dashed var(--borde);border-radius:12px;padding:60px;text-align:center;color:var(--borde);}
.coming h3{font-size:16px;font-weight:700;color:var(--gris);margin-bottom:8px;}
.coming p{font-size:13px;}
</style>
</head>
<body>
<div class="page">
  <div class="page-header">
    <div class="page-title">Inventario de insumos</div>
    <button class="btn-primary">+ Ingresar insumo</button>
  </div>
  <div class="coming">
    <div style="font-size:40px;margin-bottom:12px;">📦</div>
    <h3>Módulo de Inventario</h3>
    <p>Disponible en Día 2 del desarrollo.<br>Gestión de insumos crudos, stock de seguridad y abastecimiento.</p>
  </div>
</div>
<script type="module">
import { initPage } from './nav.js';
await initPage(['directora','operaciones','ventas']);
</script>
</body>
</html>
