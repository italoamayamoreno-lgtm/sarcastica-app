<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Empaque · Sarcástica OS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f1e8df;--black:#000;--rosa:#e1c4c1;--borde:#cca99d;--gris:#50504f;--verde:#3B6D11;--azul:#185FA5;--naranja:#854F0B;--rojo:#A32D2D;}
#app-nav{position:fixed;top:0;left:0;right:0;z-index:200;background:#000;display:flex;align-items:center;padding:0 20px;height:52px;border-bottom:2px solid #e1c4c1;font-family:"Poppins",sans-serif;}
#app-nav .nav-logo{display:flex;align-items:center;margin-right:16px;flex-shrink:0;text-decoration:none;}
#app-nav .nav-divider{width:1px;height:20px;background:#333;margin-right:8px;flex-shrink:0;}
#app-nav .nav-items{display:flex;gap:2px;flex:1;overflow-x:auto;}
#app-nav .nav-items::-webkit-scrollbar{display:none;}
#app-nav a.nav-link{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;color:#888;text-decoration:none;white-space:nowrap;transition:background .15s,color .15s;}
#app-nav a.nav-link:hover{background:#111;color:#f1e8df;}
#app-nav a.nav-link.active{background:#e1c4c1;color:#000;font-weight:600;}
#app-nav .nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0;}
#app-nav .nav-powered{font-size:10px;color:#444;letter-spacing:.04em;white-space:nowrap;}
#app-nav .nav-powered strong{color:#cca99d;}
#app-nav .nav-username{font-size:11px;color:#888;white-space:nowrap;}
#app-nav .btn-salir{background:none;border:1px solid #333;color:#888;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:"Poppins",sans-serif;font-size:11px;white-space:nowrap;}
#app-nav .btn-salir:hover{border-color:#e1c4c1;color:#f1e8df;}
.nav-user-wrap{position:relative;}
#nav-menu-btn{display:flex;width:28px;height:28px;border-radius:50%;background:#e1c4c1;border:none;cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0;flex-shrink:0;}
#nav-menu-btn span{display:block;width:12px;height:1.5px;background:#000;border-radius:2px;}
#nav-menu-dropdown{display:none;position:absolute;top:38px;right:0;background:#fff;border:1.5px solid var(--borde);border-radius:10px;min-width:180px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:500;}
#nav-menu-dropdown.open{display:block;}
#nav-menu-dropdown a{display:block;padding:11px 16px;font-size:13px;color:var(--black);text-decoration:none;font-family:"Poppins",sans-serif;white-space:nowrap;}
#nav-menu-dropdown a:hover{background:var(--bg);}
#nav-menu-dropdown .menu-sep{height:1px;background:var(--borde);margin:4px 0;}
body{padding-top:52px;font-family:"Poppins",sans-serif;background:var(--bg);min-height:100vh;color:var(--black);}

.page{max-width:900px;margin:0 auto;padding:28px 24px;}
.page-header{margin-bottom:24px;}
.page-title{font-size:20px;font-weight:800;}
.page-sub{font-size:12px;color:var(--gris);margin-top:3px;}

/* MÉTRICAS */
.metricas{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.metrica{background:#fff;border:1.5px solid var(--borde);border-radius:12px;padding:14px 16px;}
.metrica .ml{font-size:11px;color:var(--gris);text-transform:uppercase;letter-spacing:.06em;font-weight:500;margin-bottom:4px;}
.metrica .mv{font-size:26px;font-weight:800;line-height:1;}

/* FILTROS */
.filtros{display:flex;gap:8px;margin-bottom:16px;}
.filtro-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--borde);background:#fff;font-family:"Poppins",sans-serif;font-size:12px;font-weight:500;color:var(--gris);cursor:pointer;transition:all .15s;}
.filtro-btn.active,.filtro-btn:hover{background:var(--black);color:#fff;border-color:var(--black);}

/* CARDS */
.card{background:#fff;border:1.5px solid var(--borde);border-radius:12px;padding:18px;margin-bottom:12px;}
.card.empaquetado{border-color:#b8dcb8;background:#f8fff5;}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.card-nombre{font-size:14px;font-weight:700;}
.card-meta{font-size:11px;color:var(--gris);margin-top:2px;}
.badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.badge-pend{background:#faeeda;color:var(--naranja);}
.badge-proc{background:#e0eaf8;color:var(--azul);}
.badge-emp{background:#e8f5e0;color:var(--verde);}

/* ITEMS */
.items-box{background:var(--bg);border-radius:8px;padding:12px;margin-bottom:10px;}
.item-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:1px solid #e6dddb;}
.item-row:first-child{border-top:none;}
.item-nombre{font-size:12px;font-weight:600;}
.item-diseno{font-size:11px;color:var(--gris);}
.item-listo{font-size:11px;font-weight:600;color:var(--verde);}

/* OBSERVACIÓN */
.obs-box{background:#faeeda;border-radius:6px;padding:8px 12px;font-size:12px;color:var(--naranja);margin-bottom:12px;display:flex;align-items:center;gap:6px;}

/* ACCIONES */
.card-actions{display:flex;justify-content:flex-end;}
.btn-avanzar{background:var(--black);color:#fff;border:none;padding:9px 18px;border-radius:8px;font-family:"Poppins",sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.btn-avanzar:hover{opacity:.8;}
.btn-avanzar:disabled{opacity:.4;cursor:not-allowed;}
.btn-despacho{background:var(--verde);color:#fff;border:none;padding:9px 18px;border-radius:8px;font-family:"Poppins",sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.btn-despacho:hover{opacity:.8;}

.empty{text-align:center;padding:60px 0;color:var(--borde);font-size:13px;}
.empty-wrap{background:#fff;border:1.5px solid var(--borde);border-radius:12px;padding:60px;text-align:center;color:var(--borde);}
.empty-wrap p{font-size:13px;}
</style>
</head>
<body>

<nav id="app-nav">
  <a href="inventario.html" class="nav-logo">
    <svg viewBox="0 0 200 36" xmlns="http://www.w3.org/2000/svg" height="20"><text x="0" y="29" font-family="Georgia,serif" font-size="29" font-weight="400" fill="#ffffff" letter-spacing="-0.5">sarcástica.</text></svg>
  </a>
  <div class="nav-divider"></div>
  <div class="nav-items">
    <a href="inventario.html" class="nav-link" data-page="inventario">Inventario</a>
    <a href="pedidos.html"    class="nav-link" data-page="pedidos">Pedidos</a>
    <a href="validar.html"    class="nav-link" data-page="validar">Validar Pagos</a>
    <a href="produccion.html" class="nav-link" data-page="produccion">Producción</a>
    <a href="empaque.html"    class="nav-link active" data-page="empaque">Empaque</a>
    <a href="ruta.html"       class="nav-link" data-page="ruta">Ruta</a>
    <a href="clientes.html"   class="nav-link" data-page="clientes">CRM</a>
  </div>
  <div class="nav-right">
    <span class="nav-powered">powered by <strong>Etrazia</strong></span>
    <span class="nav-username" id="nav-rol"></span>
    <div class="nav-user-wrap">
      <button id="nav-menu-btn"><span></span><span></span><span></span></button>
      <div id="nav-menu-dropdown">
        <a href="dashboard.html">Dashboard</a>
        <a href="clientes.html">CRM Clientes</a>
        <div class="menu-sep"></div>
        <a href="configuracion.html">Configuración</a>
      </div>
    </div>
    <button class="btn-salir" id="btn-salir">Salir</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div class="page-title">Empaque</div>
    <div class="page-sub" id="pageSub"></div>
  </div>

  <div class="metricas">
    <div class="metrica">
      <div class="ml">Por empaquetar</div>
      <div class="mv" style="color:var(--naranja)" id="m-pend">0</div>
    </div>
    <div class="metrica">
      <div class="ml">Empaquetados</div>
      <div class="mv" style="color:var(--verde)" id="m-emp">0</div>
    </div>
    <div class="metrica">
      <div class="ml">A despacho hoy</div>
      <div class="mv" style="color:var(--gris)" id="m-desp">0</div>
    </div>
  </div>

  <div class="filtros">
    <button class="filtro-btn active" data-filtro="en_empaque">Pendientes</button>
    <button class="filtro-btn" data-filtro="empaquetado">A despacho</button>
  </div>

  <div id="listaPedidos"><div class="empty-wrap"><p>Cargando...</p></div></div>
</div>

<script type="module">
import { initPage, db } from './nav.js';
import {
  collection, query, where, onSnapshot,
  doc, getDocs, updateDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const EMPRESA = 'sarcastica';
const user = await initPage(['directora','operaciones','produccion']);

const hoy = new Date();
const hoyStr = hoy.toISOString().split('T')[0];
document.getElementById('pageSub').textContent =
  'Pedidos listos desde producción · ' + hoy.toLocaleDateString('es-PE',{day:'numeric',month:'long'});

const col = collection(db,`empresas/${EMPRESA}/pedidos`);

// Contadores
onSnapshot(query(col, where('estado','==','en_empaque')), s =>
  document.getElementById('m-pend').textContent = s.size);
onSnapshot(query(col, where('estado','==','empaquetado')), s1 => {
  onSnapshot(query(col, where('estado','==','en_ruta')), s2 => {
    const total = s1.size + s2.size;
    document.getElementById('m-emp').textContent = total;
    document.getElementById('m-desp').textContent = total;
  });
});

let filtroActual = 'en_empaque';
let unsubLista = null;

function cargar() {
  if (unsubLista) unsubLista();

  // Buscar pedidos con ítems en estado listo_empaque (incluye adicionales de pedidos ya empaquetados)
  unsubLista = onSnapshot(collection(db,`empresas/${EMPRESA}/pedidos`), async snap => {
    const lista = document.getElementById('listaPedidos');
    const pedidosToShow = [];

    for (const d of snap.docs) {
      const itemsSnap = await getDocs(collection(db,`empresas/${EMPRESA}/pedidos/${d.id}/items`));
      const items = [];
      itemsSnap.forEach(i => items.push({id:i.id,...i.data()}));

      // Incluir si tiene ítems en listo_empaque
      const tieneListos = items.some(i => i.estado === 'listo_empaque');

      if (filtroActual === 'en_empaque' && tieneListos) {
        pedidosToShow.push({id:d.id,...d.data(),items});
      } else if (filtroActual === 'empaquetado' &&
        ['empaquetado','en_ruta'].includes(d.data().estado) && !tieneListos) {
        pedidosToShow.push({id:d.id,...d.data(),items});
      }
    }

    if (pedidosToShow.length === 0) {
      lista.innerHTML = '<div class="empty-wrap"><p>No hay pedidos en este estado</p></div>';
      return;
    }

    const ESTADO_LABEL_EMP = {
      pendiente:'Pendiente', produccion:'En producción', listo_empaque:'Listo para empaquetar',
      empaquetado:'Empaquetado ✓', en_ruta:'En ruta', entregado:'Entregado',
    };

    const htmls = pedidosToShow.map(p => {
      const pid = p.id;
      const items = p.items || [];

      const itemsHtml = items.map(i => {
        const esListo = i.estado === 'listo_empaque';
        const esEmpaquetado = i.estado === 'empaquetado';
        const adicBadge = i.esAdicional ? '<span style="background:#fff3cd;color:#856404;padding:1px 5px;border-radius:8px;font-size:10px;font-weight:600;margin-left:4px;">⚡ Adicional</span>' : '';

        if (esEmpaquetado) {
          return `<div class="item-row" style="opacity:.45;">
            <div>
              <div class="item-nombre">${i.productoNombre||'—'}${adicBadge}</div>
              <div class="item-diseno">${i.diseno||''}</div>
            </div>
            <span style="font-size:11px;color:var(--gris);font-style:italic;">Ya empaquetado ✓</span>
          </div>`;
        }
        if (esListo) {
          return `<div class="item-row">
            <div>
              <div class="item-nombre">${i.productoNombre||'—'}${adicBadge}</div>
              <div class="item-diseno">${i.diseno||''}</div>
            </div>
            <span class="item-listo">✓ Listo</span>
          </div>`;
        }
        // Bloqueado (en producción u otro estado)
        return `<div class="item-row" style="opacity:.4;">
          <div>
            <div class="item-nombre">${i.productoNombre||'—'}${adicBadge}</div>
            <div class="item-diseno">${i.diseno||''}</div>
          </div>
          <span style="font-size:10px;color:var(--gris);font-style:italic;">${ESTADO_LABEL_EMP[i.estado]||i.estado}</span>
        </div>`;
      }).join('');

      const obsHtml = p.observacion ? `<div class="obs-box">📝 Observación: <strong>${p.observacion}</strong></div>` : '';

      // Ítems listos para empaquetar
      const itemsListos = items.filter(i => i.estado === 'listo_empaque');
      const todosEmpaquetados = items.every(i => ['empaquetado','en_ruta','entregado'].includes(i.estado));
      const tieneAdicListos = items.some(i => i.esAdicional && i.estado === 'listo_empaque');

      let badgeHtml, accionHtml;
      if (todosEmpaquetados) {
        badgeHtml = '<span class="badge badge-emp">✓ Todo empaquetado</span>';
        accionHtml = `<div class="card-actions"><span style="font-size:12px;color:var(--verde);font-weight:600;">✓ Listo para despacho</span></div>`;
      } else if (tieneAdicListos) {
        badgeHtml = '<span class="badge badge-pend">⚡ Ítem adicional listo</span>';
        accionHtml = `<div class="card-actions"><button class="btn-avanzar" onclick="confirmarEmpaqueItems('${pid}','${(p.cliente_nombre||'').replace(/'/g,"\'")}')">Empaquetar ítems listos ✓</button></div>`;
      } else {
        badgeHtml = '<span class="badge badge-pend">Pendiente empaque</span>';
        accionHtml = `<div class="card-actions"><button class="btn-avanzar" onclick="confirmarEmpaqueItems('${pid}','${(p.cliente_nombre||'').replace(/'/g,"\'")}')">Confirmar empaque ✓</button></div>`;
      }

      return `<div class="card${todosEmpaquetados?' empaquetado':''}" id="card-${pid}">
        <div class="card-header">
          <div>
            <div class="card-nombre">${p.cliente_nombre||'—'}</div>
            <div class="card-meta">${[p.distrito,p.provincia].filter(Boolean).join(' · ')} · ${p.fechaEntrega||'—'} · ${p.canal||'—'}</div>
          </div>
          ${badgeHtml}
        </div>
        <div class="items-box">${itemsHtml}</div>
        ${obsHtml}
        ${accionHtml}
      </div>`;
    });

    lista.innerHTML = htmls.join('');
  });
}


// Empaquetar todos los ítems en listo_empaque
window.confirmarEmpaqueItems = async (pid, clienteNombre) => {
  // Modal de confirmación
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:600;display:flex;align-items:center;justify-content:center;';
  div.innerHTML = `<div style="background:#fff;border-radius:16px;padding:28px;max-width:380px;width:90%;text-align:center;font-family:'Poppins',sans-serif;">
    <div style="font-size:32px;margin-bottom:10px;">📦</div>
    <div style="font-size:15px;font-weight:700;margin-bottom:8px;">¿Confirmar empaque?</div>
    <div style="font-size:13px;color:#50504f;margin-bottom:20px;">Pedido de <strong>${clienteNombre}</strong><br>¿Todos los ítems listos están bien empaquetados?</div>
    <div style="display:flex;gap:8px;justify-content:center;">
      <button id="bNo" style="background:#fff;border:1.5px solid #cca99d;color:#50504f;padding:9px 18px;border-radius:8px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;cursor:pointer;">Cancelar</button>
      <button id="bSi" style="background:#000;color:#fff;border:none;padding:9px 18px;border-radius:8px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;cursor:pointer;">Sí, confirmar ✓</button>
    </div>
  </div>`;
  document.body.appendChild(div);
  div.querySelector('#bNo').onclick = () => div.remove();
  div.querySelector('#bSi').onclick = async () => {
    div.remove();
    try {
      // Empaquetar todos los ítems en listo_empaque
      const itemsSnap = await getDocs(collection(db,`empresas/${EMPRESA}/pedidos/${pid}/items`));
      for (const iDoc of itemsSnap.docs) {
        if (iDoc.data().estado === 'listo_empaque') {
          await updateDoc(doc(db,`empresas/${EMPRESA}/pedidos/${pid}/items`,iDoc.id), {estado:'empaquetado'});
        }
      }
      // Verificar si TODOS los ítems están empaquetados
      const allSnap = await getDocs(collection(db,`empresas/${EMPRESA}/pedidos/${pid}/items`));
      let todos = true;
      allSnap.forEach(i => {
        if (!['empaquetado','en_ruta','entregado'].includes(i.data().estado)) todos = false;
      });
      // Si todos empaquetados → pasar a en_ruta para que aparezca en Ruta
      if (todos) {
        await updateDoc(doc(db,`empresas/${EMPRESA}/pedidos`,pid), {
          estado:'en_ruta',
          empaquetadoEn: serverTimestamp(),
          empaquetadoPor: user.nombre||user.email
        });
      }
    } catch(e) {
      console.error(e); alert('Error al confirmar empaque.');
    }
  };
};

// Pasar a despacho → estado: en_ruta (pasa a bandeja de Ruta)
window.pasarDespacho = async (pid) => {
  const btn = document.querySelector(`#card-${pid} .btn-despacho`);
  if (btn) { btn.disabled = true; btn.textContent = 'Procesando...'; }
  try {
    await updateDoc(doc(db,`empresas/${EMPRESA}/pedidos`,pid), {
      estado: 'en_ruta',
      pasadoRutaEn: serverTimestamp(),
    });
  } catch(e) {
    console.error(e);
    alert('Error. Intenta de nuevo.');
    if (btn) { btn.disabled = false; btn.textContent = 'Pasar a despacho →'; }
  }
};

// Filtros
document.querySelectorAll('.filtro-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filtroActual = btn.dataset.filtro;
    cargar();
  });
});

cargar();
</script>
</body>
</html>
